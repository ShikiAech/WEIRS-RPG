<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grimório Arcano — Weirs RPG</title>
  <link rel="stylesheet" href="/WEIRS-RPG/css/style.css">
  <style>
   /* Customizações específicas para a ferramenta de magias sem quebrar o CSS global */
    .filtros-fixos {
      position: sticky;
      top: 20px;
      z-index: 100;
      margin-bottom: 30px;
    }
    
    .busca-box {
      width: 100%;
      padding: 15px 20px;
      font-size: 1.1rem;
      background: #1a1a22;
      border: 2px solid var(--border-fantasy);
      color: #fff;
      border-radius: 4px;
      transition: all 0.3s;
      font-family: 'Cinzel', serif;
      margin-top: 15px;
    }
    
    .busca-box:focus {
      outline: none;
      border-color: #f39c12;
      box-shadow: 0 0 15px rgba(243, 156, 18, 0.2);
    }
    
    .grid-filtros-magia {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    
    .label-filtro {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 8px;
      font-family: 'Cinzel', serif;
      letter-spacing: 1px;
    }
    
    .select-filtro-rpg {
      width: 100%;
      padding: 12px 15px;
      background: #1a1a22;
      border: 1px solid var(--border-fantasy);
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.3s;
    }
    
    .select-filtro-rpg:hover, .select-filtro-rpg:focus {
      border-color: #f39c12;
      outline: none;
    }
    
    .contador {
      text-align: right;
      margin-top: 15px;
      font-size: 0.9rem;
      color: #888;
      font-family: 'Cinzel', serif;
    }
    
    .contador strong {
      color: #f39c12;
      font-size: 1.1rem;
    }
    
    .grid-grimorio-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
      margin-top: 25px;
    }
    
    .card-magia {
      background: rgba(25, 25, 27, 0.95);
      border: 1px solid var(--border-fantasy);
      border-radius: 4px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    
    .card-magia:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(243, 156, 18, 0.15);
      border-color: #f39c12;
    }
    
    .header-magia {
      border-bottom: 1px solid rgba(243, 156, 18, 0.2);
      padding-bottom: 10px;
      margin-bottom: 15px;
    }
    
    .nome-magia {
      font-family: 'Cinzel', serif;
      color: #f39c12;
      font-size: 1.2rem;
      margin: 0;
      line-height: 1.4;
    }
    
    .subtitulo-magia {
      font-size: 0.8rem;
      font-style: italic;
      color: #8b7355;
      margin-top: 5px;
    }
    
    .meta-magia-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 15px;
      font-size: 0.85rem;
      background: rgba(0,0,0,0.3);
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 15px;
    }
    
    .meta-item {
      color: #bbb;
    }
    
    .meta-item strong {
      color: #ebc063;
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
    }
    
    .desc-magia {
      font-size: 0.9rem;
      line-height: 1.6;
      color: #cbd5e1;
      text-align: justify;
      flex-grow: 1;
    }
    
    .desc-magia strong {
      color: #f39c12;
    }
    
    .badges-classes {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 15px;
      padding-top: 12px;
      border-top: 1px dashed rgba(255,255,255,0.08);
    }
    
    .badge-classe {
      font-size: 0.7rem;
      text-transform: uppercase;
      font-weight: bold;
      padding: 3px 8px;
      background: rgba(142, 68, 173, 0.1);
      border: 1px solid rgba(142, 68, 173, 0.3);
      color: #a29bfe;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }
    
    .sem-resultados {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: #666;
      border: 2px dashed rgba(243, 156, 18, 0.2);
      border-radius: 4px;
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

              <option value="Necromancia">Necromancia</option>
              <option value="Transmutação">Transmutação</option>
            </select>
          </div>
        </div>
        
        <div class="contador">

        </div>
      </div>
    </div>
    
    <div id="grimorio-lista" class="grid-grimorio-cards"></div>
  </div>

  {nome:"🔥 Esfera Flamejante (Flaming Sphere)",nivel:2,escola:"Conjuração",tempo:"1 Ação",alcance:"18m",componentes:"V, S, M (sebo)",duracao:"Concentração, até 1 min",classes:["mago","druida","feiticeiro"],descricao:"Esfera de fogo de 1,5m de diâmetro. Criaturas adjacentes sofrem <strong>2d6 de dano de fogo</strong> (DES metade). Move-se 9m com ação bônus. +1d6 por nível acima."},
  {nome:"💨 Rajada de Vento (Gust of Wind)",nivel:2,escola:"Evocação",tempo:"1 Ação",alcance:"Pessoal (linha 18m)",componentes:"V, S, M (semente)",duracao:"Concentração, até 1 min",classes:["mago","druida","feiticeiro"],descricao:"Linha de vento forte de 18m por 3m de largura. Criaturas que entrarem ou começarem lá devem passar em FOR ou serem empurradas 4,5m. Dispersa gases e névoas."},
  {nome:"🦠 Cegueira/Surdez (Blindness/Deafness)",nivel:2,escola:"Necromancia",tempo:"1 Ação",alcance:"9m",componentes:"V",duracao:"1 minuto",classes:["mago","clerigo","feiticeiro","bardo"],descricao:"Alvo falha em CON e fica <strong>cego ou surdo</strong> (sua escolha). Repete teste no fim de cada turno. +1 alvo por nível acima."},
  {nome:"🛡️ Proteção contra Veneno (Protection from Poison)",nivel:2,escola:"Abjuração",tempo:"1 Ação",alcance:"Toque",componentes:"V, S",duracao:"1 hora",classes:["clerigo","druida","paladino","patrulheiro","artifice"],descricao:"Neutraliza veneno ativo no alvo e concede <strong>vantagem contra envenenamento</strong> e resistência a dano de veneno pela duração."},
  {nome:"🔇 Silêncio (Silence)",nivel:2,escola:"Ilusão",tempo:"1 Ação (Ritual)",alcance:"36m",componentes:"V, S",duracao:"Concentração, até 10 min",classes:["clerigo","bardo","patrulheiro"],descricao:"Esfera de 6m de raio com <strong>silêncio absoluto</strong>. Nenhum som pode ser criado ou passar. Criaturas dentro são imunes a dano de trovão. Magias verbais não funcionam."},
  {nome:"🧶 Imobilizar Pessoa (Hold Person)",nivel:2,escola:"Encantamento",tempo:"1 Ação",alcance:"18m",componentes:"V, S, M (ferro)",duracao:"Concentração, até 1 min",classes:["mago","clerigo","feiticeiro","druida","bardo","bruxo"],descricao:"Humanóide visível fica <strong>paralisado</strong> se falhar em SAB. Repete teste no fim de cada turno. +1 alvo por nível acima."},
  {nome:"🔥 Arma Mágica (Magic Weapon)",nivel:2,escola:"Transmutação",tempo:"1 Ação Bônus",alcance:"Toque",componentes:"V, S",duracao:"Concentração, até 1 hora",classes:["mago","paladino","artifice"],descricao:"Arma tocada se torna mágica com <strong>+1 de bônus</strong> em ataque e dano. +2 com slot de 4º, +3 com slot de 6º."},
  {nome:"🌿 Restauração Menor (Lesser Restoration)",nivel:2,escola:"Abjuração",tempo:"1 Ação",alcance:"Toque",componentes:"V, S",duracao:"Instantânea",classes:["clerigo","druida","paladino","patrulheiro","bardo","artifice"],descricao:"Remove uma condição: <strong>cego, surdo, paralisado, envenenado</strong> ou uma doença do alvo tocado."},
  {nome:"🗡️ Lâmina Sombria (Shadow Blade)",nivel:2,escola:"Ilusão",tempo:"1 Ação Bônus",alcance:"Pessoal",componentes:"V, S",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro","bruxo"],descricao:"Cria espada de escuridão sólida. Arma simples com acuidade, sutil e arremesso (6/18m). Causa <strong>2d8 de dano psíquico</strong>. Vantagem em penumbra/escuridão. +1d8 por 2 níveis acima."},
  {nome:"🌊 Caminhar Sobre as Águas (Water Walk)",nivel:2,escola:"Transmutação",tempo:"1 Ação (Ritual)",alcance:"9m",componentes:"V, S, M (rolha)",duracao:"1 hora",classes:["clerigo","druida","patrulheiro","feiticeiro","artifice"],descricao:"Até 10 criaturas podem andar sobre líquidos (água, ácido, lava) como se fossem sólidos. Também concede resistência a dano de ácido e fogo de fontes líquidas."},
  {nome:"🔮 Visão no Escuro (Darkvision)",nivel:2,escola:"Transmutação",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (cenoura)",duracao:"8 horas",classes:["mago","druida","patrulheiro","feiticeiro","artifice"],descricao:"Criatura tocada ganha <strong>visão no escuro de 18m</strong> por toda a duração."},
  {nome:"🐾 Passos sem Rastro (Pass without Trace)",nivel:2,escola:"Abjuração",tempo:"1 Ação",alcance:"Pessoal",componentes:"V, S, M (cinzas)",duracao:"Concentração, até 1 hora",classes:["druida","patrulheiro"],descricao:"Você e aliados a 9m ganham <strong>+10 em Furtividade</strong> e não podem ser rastreados por meios não mágicos. Não deixam pegadas ou sinais de passagem."},
  {nome:"🪢 Corda de Escalada (Rope Trick)",nivel:2,escola:"Transmutação",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (seda)",duracao:"1 hora",classes:["mago","artifice"],descricao:"Corda sobe verticalmente e se prende num espaço extradimensional. Até 8 criaturas podem subir e se esconder lá. A entrada é invisível do exterior."},
  {nome:"💀 Toque Vampírico (Vampiric Touch)",nivel:2,escola:"Necromancia",tempo:"1 Ação",alcance:"Pessoal",componentes:"V, S",duracao:"Concentração, até 1 min",classes:["mago","bruxo"],descricao:"Suas mãos drenam vida. Ataque corpo a corpo mágico: <strong>3d6 de dano necrótico</strong> e você recupera metade do dano como PV. +1d6 por nível acima."},
  {nome:"🔥 Raio Ardente (Scorching Ray)",nivel:2,escola:"Evocação",tempo:"1 Ação",alcance:"36m",componentes:"V, S",duracao:"Instantânea",classes:["mago","feiticeiro"],descricao:"Dispara 3 raios de fogo. Ataque mágico à distância para cada: <strong>2d6 de dano de fogo</strong>. Raios podem mirar alvos diferentes. +1 raio por nível acima."},
  {nome:"🐺 Sentido Bestial (Beast Sense)",nivel:2,escola:"Adivinhação",tempo:"1 Ação (Ritual)",alcance:"Toque",componentes:"S",duracao:"Concentração, até 1 hora",classes:["druida","patrulheiro"],descricao:"Você vê e ouve através dos sentidos de uma besta voluntária enquanto ela estiver a até 1,5km de você. Fica cego e surdo para seus próprios sentidos."},
  {nome:"💫 Calmaria (Calm Emotions)",nivel:2,escola:"Encantamento",tempo:"1 Ação",alcance:"18m",componentes:"V, S",duracao:"Concentração, até 1 min",classes:["clerigo","bardo"],descricao:"Suprime emoções num raio de 6m. Pode tornar criaturas <strong>imunes a medo e enfeitiçamento</strong> ou torná-las indiferentes a hostilidade (teste de CAR resiste)."},
  {nome:"🌍 Amolecer Terra (Soften Earth and Stone)",nivel:2,escola:"Transmutação",tempo:"1 Ação",alcance:"36m",componentes:"V, S, M (argila)",duracao:"Concentração, até 1 hora",classes:["druida"],descricao:"Transforma pedra em lama ou terra em areia movediça num quadrado de 3m, criando <strong>terreno difícil</strong>. Criaturas na área podem ficar atoladas."},
  {nome:"🛡️ Aura de Vitalidade (Aura of Vitality)",nivel:2,escola:"Abjuração",tempo:"1 Ação",alcance:"Pessoal (9m raio)",componentes:"V",duracao:"Concentração, até 1 min",classes:["clerigo","druida","paladino"],descricao:"Aura curativa. Com ação bônus, você pode curar <strong>2d6 PV</strong> de uma criatura na aura. Pode usar isso em cada turno, máximo de 10 vezes."},
  {nome:"🎯 Nuvem de Adagas (Cloud of Daggers)",nivel:2,escola:"Conjuração",tempo:"1 Ação",alcance:"18m",componentes:"V, S, M (lasca de vidro)",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro","bard","bruxo"],descricao:"Adagas giratórias preenchem cubo de 1,5m. Criaturas sofrem <strong>4d4 de dano cortante</strong> ao entrar ou começar turno lá. +2d4 por nível acima."},
  {nome:"🌀 Ampliar/Reduzir (Enlarge/Reduce)",nivel:2,escola:"Transmutação",tempo:"1 Ação",alcance:"9m",componentes:"V, S, M (pó de ferro)",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro","artifice"],descricao:"Alvo aumenta ou diminui uma categoria de tamanho. Ampliar: +1d4 de dano em armas, vantagem em FOR. Reduzir: -1d4 de dano, desvantagem em FOR."},
  {nome:"🦋 Alterar-se (Alter Self)",nivel:2,escola:"Transmutação",tempo:"1 Ação",alcance:"Pessoal",componentes:"V, S",duracao:"Concentração, até 1 hora",classes:["mago","feiticeiro","artifice"],descricao:"Muda seu corpo: adaptação aquática (guelras, nadadeiras), mudar aparência (como Disfarce, mas físico), ou armas naturais (garras 1d6 + mod)."},
  {nome:"📜 Augúrio (Augury)",nivel:2,escola:"Adivinhação",tempo:"1 Minuto (Ritual)",alcance:"Pessoal",componentes:"V, S, M (runas)",duracao:"Instantânea",classes:["clerigo"],descricao:"Recebe um presságio sobre o resultado de uma ação específica nos próximos 30 minutos: êxito, fracasso, ambos ou nada. 25% de chance de resposta aleatória se usado repetidamente."},
  {nome:"🔗 Vinculo Protetor (Warding Bond)",nivel:2,escola:"Abjuração",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (anéis de platina)",duracao:"1 hora",classes:["clerigo"],descricao:"Protege uma criatura com +1 na CA e +1 em testes de resistência, mas você sofre o mesmo dano que ela. Termina se separados por mais de 18m ou se você cair a 0 PV."},
  {nome:"🧊 Lufada de Neve (Snilloc's Snowball Swarm)",nivel:2,escola:"Evocação",tempo:"1 Ação",alcance:"27m",componentes:"V, S, M (bola de gelo)",duracao:"Instantânea",classes:["mago","feiticeiro"],descricao:"Bolas de gelo explodem em raio de 1,5m. Criaturas na área sofrem <strong>3d6 de dano de frio</strong>, metade se passarem em teste de DES. +1d6 por nível acima."},
  {nome:"🗝️ Arrombar (Knock)",nivel:2,escola:"Transmutação",tempo:"1 Ação",alcance:"18m",componentes:"V",duracao:"Instantânea",classes:["mago","feiticeiro","bard"],descricao:"Abre instantaneamente objetos trancados (fechaduras, correntes, portas) que estejam fechados por meios mundanos ou mágicos. Emite som audível a até 90m."},
  {nome:"🧟 Animar Mortos (Animate Dead)",nivel:2,escola:"Necromancia",tempo:"1 Minuto",alcance:"3m",componentes:"V, S, M (osso)",duracao:"24 horas",classes:["mago","clerigo"],descricao:"Cria esqueletos ou zumbis a partir de cadáveres. Eles obedecem seus comandos verbais. Pode reafirmar controle a cada 24h conjurando novamente."},
  {nome:"🌿 Vinhas de Espinhos (Spike Growth)",nivel:2,escola:"Transmutação",tempo:"1 Ação",alcance:"45m",componentes:"V, S, M (espinhos)",duracao:"Concentração, até 10 min",classes:["druida","patrulheiro"],descricao:"Espinhos duros camuflados cobrem raio de 6m. Criaturas sofrem <strong>2d4 de dano perfurante</strong> para cada 1,5m percorrido na área. Percepção CD 15 para notar o perigo."},
  {nome:"👁️ Zona da Verdade (Zone of Truth)",nivel:2,escola:"Encantamento",tempo:"1 Ação",alcance:"18m",componentes:"V, S",duracao:"10 minutos",classes:["clerigo","paladino","bard"],descricao:"Cria zona mágica de 4,5m de raio. Criaturas que falharem em teste de CAR <strong>não podem mentir conscientemente</strong> enquanto estiverem dentro. Sabem que estão sob efeito."},
  {nome:"🎯 Flecha Ácida de Melf (Melf's Acid Arrow)",nivel:2,escola:"Evocação",tempo:"1 Ação",alcance:"27m",componentes:"V, S, M (folha de ruibarbo)",duracao:"Instantânea",classes:["mago"],descricao:"Flecha ácida. Ataque mágico à distância causa <strong>4d4 de dano de ácido</strong> imediatamente e 2d4 no próximo turno do alvo. +1d4 por nível acima."},
  {nome:"🦋 Pele de Árvore (Barkskin)",nivel:2,escola:"Transmutação",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (casca de carvalho)",duracao:"Concentração, até 1 hora",classes:["druida","patrulheiro"],descricao:"A pele do alvo fica como casca de árvore. Sua <strong>CA nunca é menor que 16</strong>, independentemente da armadura que usar."},
  {nome:"🐾 Vínculo Bestial (Beast Bond)",nivel:2,escola:"Adivinhação",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (pelo)",duracao:"Concentração, até 10 min",classes:["druida","patrulheiro"],descricao:"Cria ligação telepática com besta amigável. Você pode se comunicar com ela e ela tem <strong>vantagem em ataques</strong> contra criaturas adjacentes a você."},
  {nome:"💨 Fôlego Curativo (Healing Spirit)",nivel:2,escola:"Conjuração",tempo:"1 Ação Bônus",alcance:"18m",componentes:"V, S",duracao:"Concentração, até 1 min",classes:["druida","patrulheiro"],descricao:"Invoca espírito curativo num quadrado de 1,5m. Quando uma criatura passa pelo espaço ou termina turno lá, você pode curá-la em <strong>1d6 PV</strong>. Máximo de 1+mod de SAB vezes."},
  {nome:"🔍 Localizar Objeto (Locate Object)",nivel:2,escola:"Adivinhação",tempo:"1 Ação",alcance:"Pessoal",componentes:"V, S, M (forquilha)",duracao:"Concentração, até 10 min",classes:["mago","clerigo","druida","paladino","patrulheiro","bard"],descricao:"Sente a direção e distância de um objeto específico ou tipo de objeto a até 300m. Bloqueado por chumbo ou paredes grossas."},
  {nome:"🦅 Visão Águia (Eagle's Splendor)",nivel:2,escola:"Transmutação",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (penas de águia)",duracao:"Concentração, até 1 hora",classes:["mago","feiticeiro","bard","artifice"],descricao:"Criatura tocada ganha <strong>vantagem em testes de Carisma</strong> e +2 na CD de suas magias de encantamento."},
  {nome:"💪 Força do Touro (Bull's Strength)",nivel:2,escola:"Transmutação",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (pelo de touro)",duracao:"Concentração, até 1 hora",classes:["mago","feiticeiro","druida","artifice"],descricao:"Criatura tocada ganha <strong>vantagem em testes e salvaguardas de Força</strong> e +2 de bônus em jogadas de dano corpo a corpo."},
  {nome:"🧠 Astúcia da Raposa (Fox's Cunning)",nivel:2,escola:"Transmutação",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (pelo de raposa)",duracao:"Concentração, até 1 hora",classes:["mago","feiticeiro","bard","artifice"],descricao:"Criatura tocada ganha <strong>vantagem em testes e salvaguardas de Inteligência</strong> e pode usar a ação Esquiva como Ação Bônus."},
  {nome:"🐱 Graça do Gato (Cat's Grace)",nivel:2,escola:"Transmutação",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (pelo de gato)",duracao:"Concentração, até 1 hora",classes:["mago","feiticeiro","druida","artifice"],descricao:"Criatura tocada ganha <strong>vantagem em testes e salvaguardas de Destreza</strong> e não sofre dano de queda de 6m ou menos."},
  {nome:"🦉 Sabedoria da Coruja (Owl's Wisdom)",nivel:2,escola:"Transmutação",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (penas de coruja)",duracao:"Concentração, até 1 hora",classes:["mago","feiticeiro","clerigo","druida","artifice"],descricao:"Criatura tocada ganha <strong>vantagem em testes e salvaguardas de Sabedoria</strong> e visão no escuro de 18m (ou +9m se já tiver)."},
  {nome:"🔥 Ferver Metal (Heat Metal)",nivel:2,escola:"Transmutação",tempo:"1 Ação",alcance:"18m",componentes:"V, S, M (chama)",duracao:"Concentração, até 1 min",classes:["druida","bard","artifice"],descricao:"Aquece objeto metálico visível. Criatura em contato sofre <strong>2d8 de dano de fogo</strong> inicial e 2d8 como Ação Bônus nos turnos seguintes. Se segurar, desvantagem em ataques."},
  {nome:"🌙 Raio Lunar (Moonbeam)",nivel:2,escola:"Evocação",tempo:"1 Ação",alcance:"36m",componentes:"V, S, M (semente)",duracao:"Concentração, até 1 min",classes:["druida"],descricao:"Luz pálida em raio de 1,5m. Criaturas sofrem <strong>2d10 de dano radiante</strong> ao entrar ou começar turno. Metamorfos têm desvantagem. Move-se 18m com ação."},
  {nome:"💨 Rajada Curativa (Healing Wind)",nivel:2,escola:"Evocação",tempo:"1 Ação Bônus",alcance:"Pessoal (9m raio)",componentes:"V",duracao:"Instantânea",classes:["clerigo","druida","bard"],descricao:"Você libera uma brisa curativa. Aliados a até 9m recuperam <strong>2d4 + mod de Sabedoria</strong> PV e podem se levantar se estiverem caídos sem gastar movimento."},
  // ==================== NÍVEL 3 - 45 MAGIAS ====================
  {nome:"💥 Bola de Fogo (Fireball)",nivel:3,escola:"Evocação",tempo:"1 Ação",alcance:"45m",componentes:"V, S, M (enxofre)",duracao:"Instantânea",classes:["mago","feiticeiro"],descricao:"Uma explosão flamejante em raio de 6m. Criaturas na área sofrem <strong>8d6 de dano de fogo</strong>, metade se passarem em teste de DES. Incendeia objetos inflamáveis. +1d6 por nível acima."},
  {nome:"🛑 Contramágica (Counterspell)",nivel:3,escola:"Abjuração",tempo:"1 Reação",alcance:"18m",componentes:"S",duracao:"Instantânea",classes:["mago","feiticeiro","bruxo"],descricao:"Interrompe a conjuração de uma criatura. Se a magia for de 3º nível ou menor, falha automaticamente. Se for maior, teste de atributo de conjuração CD 10 + nível da magia."},
  {nome:"⚡ Convocar Relâmpagos (Call Lightning)",nivel:3,escola:"Conjuração",tempo:"1 Ação",alcance:"36m",componentes:"V, S",duracao:"Concentração, até 10 min",classes:["druida"],descricao:"Nuvem de tempestade em cilindro de 18m de altura. Ação para invocar raio: <strong>3d10 de dano elétrico</strong> em ponto, 1,5m de raio (DES metade). +1d10 por nível. Em tempestade real: 4d10."},
  {nome:"🌀 Deslocamento (Blink)",nivel:3,escola:"Transmutação",tempo:"1 Ação",alcance:"Pessoal",componentes:"V, S",duracao:"1 minuto",classes:["mago","feiticeiro","artifice"],descricao:"Você pisca entre o Plano Material e o Etéreo. No final de cada turno, role d20: 11+ você desaparece até o início do próximo turno. Enquanto no Etéreo, é invulnerável a dano."},
  {nome:"💀 Toque do Vampiro (Vampiric Touch)",nivel:3,escola:"Necromancia",tempo:"1 Ação",alcance:"Pessoal",componentes:"V, S",duracao:"Concentração, até 1 min",classes:["mago","bruxo"],descricao:"Toque necrótico. Ataque corpo a corpo mágico: <strong>3d6 de dano necrótico</strong> e você recupera metade do dano como PV. Pode repetir o ataque a cada turno. +1d6 por nível."},
  {nome:"✨ Padrão Hipnótico (Hypnotic Pattern)",nivel:3,escola:"Ilusão",tempo:"1 Ação",alcance:"36m",componentes:"S, M (incenso)",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro","bard","bruxo"],descricao:"Luzes coloridas enchem cubo de 9m. Criaturas na área falham em SAB e ficam <strong>encantadas e incapacitadas</strong>, velocidade 0. Termina se sofrer dano ou for sacudida."},
  {nome:"🦅 Voo (Fly)",nivel:3,escola:"Transmutação",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (asa)",duracao:"Concentração, até 10 min",classes:["mago","feiticeiro","artifice"],descricao:"Criatura tocada ganha <strong>velocidade de voo de 18m</strong>. +1 alvo por nível acima. Se a magia acabar no ar, cai a menos que possa pairar."},
  {nome:"⚡ Acelerar (Haste)",nivel:3,escola:"Transmutação",tempo:"1 Ação",alcance:"9m",componentes:"V, S, M (raiz de alcaçuz)",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro","artifice"],descricao:"Alvo ganha CA+2, vantagem em salvaguardas de DES, deslocamento dobrado e uma ação extra (Atacar, Correr, Desengajar, Esconder-se, Usar Objeto). Quando a magia acaba, fica 1 rodada sem ação."},
  {nome:"👻 Forma Gasosa (Gaseous Form)",nivel:3,escola:"Transmutação",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (fumaça)",duracao:"Concentração, até 1 hora",classes:["mago","feiticeiro","bruxo"],descricao:"Criatura vira nuvem gasosa: voa 3m, passa por fendas, resistência a dano não mágico, não pode atacar ou conjurar. Só pode usar ação de Correr."},
  {nome:"🗣️ Línguas (Tongues)",nivel:3,escola:"Adivinhação",tempo:"1 Ação",alcance:"Toque",componentes:"V, M (zigurate de argila)",duracao:"1 hora",classes:["mago","clerigo","feiticeiro","bard","bruxo"],descricao:"Criatura tocada compreende e fala qualquer idioma, sendo compreendida por todos que falem pelo menos um idioma."},
  {nome:"🔥 Muralha de Vento (Wind Wall)",nivel:3,escola:"Evocação",tempo:"1 Ação",alcance:"36m",componentes:"V, S, M (leque)",duracao:"Concentração, até 1 min",classes:["druida","patrulheiro"],descricao:"Parede de vento forte de 15m de comprimento e 4,5m de altura. Flechas e projéteis são desviados. Criaturas que atravessam sofrem <strong>3d8 de dano de contusão</strong> (FOR metade)."},
  {nome:"🧊 Tempestade de Gelo Menor (Sleet Storm)",nivel:3,escola:"Conjuração",tempo:"1 Ação",alcance:"45m",componentes:"V, S, M (água congelada)",duracao:"Concentração, até 1 min",classes:["mago","druida","feiticeiro"],descricao:"Cilindro de 12m de raio com gelo e granizo. Terreno difícil, visão obscurecida. Criaturas que começam turno fazem teste de DES ou caem. Testes de CON para manter concentração têm desvantagem."},
  {nome:"🌿 Círculo de Proteção (Magic Circle)",nivel:3,escola:"Abjuração",tempo:"1 Minuto",alcance:"3m",componentes:"V, S, M (prata em pó 100po)",duracao:"1 hora",classes:["mago","clerigo","paladino","bruxo"],descricao:"Cilindro mágico de 3m de raio. Escolha um tipo (aberrações, celestiais, elementais, fadas, infernais, mortos-vivos). Eles têm desvantagem em ataques contra criaturas dentro e não podem entrar."},
  {nome:"🧟 Animar Mortos (Animate Dead)",nivel:3,escola:"Necromancia",tempo:"1 Minuto",alcance:"3m",componentes:"V, S, M (osso)",duracao:"24 horas",classes:["mago","clerigo"],descricao:"Cria esqueletos ou zumbis de cadáveres. Eles obedecem comandos verbais. Pode reafirmar controle a cada 24h. Com slot de 3º: 1 morto-vivo. +2 por nível acima."},
  {nome:"💫 Reviver (Revivify)",nivel:3,escola:"Necromancia",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (diamante 300po)",duracao:"Instantânea",classes:["clerigo","paladino","artifice"],descricao:"Traz de volta à vida uma criatura morta há até 1 minuto. Volta com 1 PV. Não recupera partes do corpo perdidas nem cura ferimentos fatais anteriores."},
  {nome:"👁️ Clarividência (Clairvoyance)",nivel:3,escola:"Adivinhação",tempo:"10 Minutos",alcance:"1,5km",componentes:"V, S, M (olho de vidro)",duracao:"Concentração, até 10 min",classes:["mago","clerigo","bard"],descricao:"Cria sensor invisível em local conhecido ou óbvio. Você vê ou ouve através dele. Pode alternar entre visão e audição com uma ação."},
  {nome:"🔮 Dissipar Magia (Dispel Magic)",nivel:3,escola:"Abjuração",tempo:"1 Ação",alcance:"36m",componentes:"V, S",duracao:"Instantânea",classes:["mago","clerigo","druida","feiticeiro","bard","bruxo","artifice","paladino"],descricao:"Dissipa efeitos mágicos. Magias de 3º nível ou inferior terminam automaticamente. Para níveis superiores, teste de atributo de conjuração CD 10 + nível da magia."},
  {nome:"🛡️ Proteção contra Energia (Protection from Energy)",nivel:3,escola:"Abjuração",tempo:"1 Ação",alcance:"Toque",componentes:"V, S",duracao:"Concentração, até 1 hora",classes:["mago","clerigo","druida","paladino","patrulheiro","artifice"],descricao:"Criatura tocada ganha <strong>resistência</strong> a um tipo de dano: ácido, frio, fogo, elétrico ou trovão. Escolha ao conjurar."},
  {nome:"💨 Enviar Mensagem (Sending)",nivel:3,escola:"Evocação",tempo:"1 Ação",alcance:"Ilimitado",componentes:"V, S, M (fio de cobre)",duracao:"1 rodada",classes:["mago","clerigo","bard"],descricao:"Envia mensagem de 25 palavras a uma criatura conhecida em qualquer plano. Ela pode responder com 25 palavras. 5% de falha se em plano diferente."},
  {nome:"🌊 Respirar na Água (Water Breathing)",nivel:3,escola:"Transmutação",tempo:"1 Ação (Ritual)",alcance:"9m",componentes:"V, S, M (junco)",duracao:"24 horas",classes:["mago","druida","patrulheiro","feiticeiro","artifice"],descricao:"Até 10 criaturas ganham capacidade de respirar debaixo d'água pela duração. Mantém respiração normal também."},
  {nome:"🏃 Velocidade (Haste)",nivel:3,escola:"Transmutação",tempo:"1 Ação",alcance:"9m",componentes:"V, S, M (raiz de alcaçuz)",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro","artifice"],descricao:"Alvo ganha CA+2, vantagem em salvaguardas de DES, deslocamento dobrado e uma ação extra (Atacar, Correr, Desengajar, Esconder-se, Usar Objeto). Quando a magia acaba, fica letárgico por 1 rodada."},
  {nome:"🐉 Medo (Fear)",nivel:3,escola:"Ilusão",tempo:"1 Ação",alcance:"Pessoal (cone 9m)",componentes:"V, S, M (pena branca)",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro","bruxo"],descricao:"Projeta imagem fantasmagórica. Criaturas no cone falham em SAB e ficam <strong>amedrontadas</strong>, largam o que seguram e usam ação de Correr para fugir a cada turno."},
  {nome:"🔥 Glifo de Vigilância (Glyph of Warding)",nivel:3,escola:"Abjuração",tempo:"1 Hora",alcance:"Toque",componentes:"V, S, M (incenso e diamante 200po)",duracao:"Até ser ativado",classes:["mago","clerigo","artifice"],descricao:"Inscreve glifo em superfície. Pode explodir em raio de 6m (<strong>5d8 de dano</strong> elemental) ou armazenar magia de 3º nível ou inferior. Dispara quando condições são cumpridas."},
  {nome:"🕯️ Falar com os Mortos (Speak with Dead)",nivel:3,escola:"Necromancia",tempo:"1 Ação",alcance:"3m",componentes:"V, S, M (incenso)",duracao:"10 minutos",classes:["clerigo","bard"],descricao:"Confere animação a um cadáver. Pode fazer 5 perguntas. O cadáver sabe apenas o que sabia em vida. Não funciona em mortos-vivos ou corpos muito danificados."},
  {nome:"🌱 Nutrir Planta (Plant Growth)",nivel:3,escola:"Transmutação",tempo:"1 Ação ou 8 Horas",alcance:"45m",componentes:"V, S",duracao:"Instantânea",classes:["druida","patrulheiro","bard"],descricao:"Versão rápida: terreno em raio de 30m vira difícil (4x deslocamento). Versão longa: enriquece plantas em 800m, dobrando colheita por 1 ano."},
  {nome:"🧊 Caminhar no Gelo (Sleet Storm)",nivel:3,escola:"Conjuração",tempo:"1 Ação",alcance:"45m",componentes:"V, S, M (água congelada)",duracao:"Concentração, até 1 min",classes:["mago","druida","feiticeiro"],descricao:"Cilindro de 12m com gelo escorregadio. Criaturas caem ao falhar em DES, terreno difícil, visão obscurecida. Concentração tem desvantagem."},
  {nome:"💥 Tempestade de Granizo (Hailstorm)",nivel:3,escola:"Evocação",tempo:"1 Ação",alcance:"36m",componentes:"V, S, M (pedra de gelo)",duracao:"Instantânea",classes:["druida","feiticeiro","mago"],descricao:"Granizo cai em cilindro de 6m de raio e 12m de altura. Criaturas sofrem <strong>2d8 de dano de contusão + 4d6 de dano de frio</strong>, metade em teste de CON. Terreno fica difícil."},
  {nome:"🦅 Montaria Fantasmagórica (Phantom Steed)",nivel:3,escola:"Ilusão",tempo:"1 Minuto (Ritual)",alcance:"9m",componentes:"V, S",duracao:"1 hora",classes:["mago"],descricao:"Cria montaria espectral com velocidade 30m. Pode galopar sobre água, lama ou areia movediça sem afundar. Desaparece se sofrer dano."},
  {nome:"👥 Criar Comida e Água (Create Food and Water)",nivel:3,escola:"Conjuração",tempo:"1 Ação",alcance:"9m",componentes:"V, S",duracao:"Instantânea",classes:["clerigo","paladino","artifice"],descricao:"Cria 20kg de comida simples e 120 litros de água limpa. Alimenta 15 humanóides ou 5 montarias por 24 horas. Comida estraga em 24h."},
  {nome:"🌙 Visão da Noite (Daylight)",nivel:3,escola:"Evocação",tempo:"1 Ação",alcance:"18m",componentes:"V, S",duracao:"1 hora",classes:["clerigo","druida","paladino","patrulheiro","feiticeiro"],descricao:"Luz radiante em raio de 18m de objeto ou ponto. Dissipa escuridão mágica de 3º nível ou inferior. Criaturas sensíveis à luz solar têm desvantagem na área."},
  {nome:"🔗 Vinculo de Proteção (Life Transference)",nivel:3,escola:"Necromancia",tempo:"1 Ação",alcance:"9m",componentes:"V, S",duracao:"Instantânea",classes:["mago","clerigo","druida"],descricao:"Você sacrifica seus próprios PV. Sofre <strong>4d8 de dano necrótico</strong> (não pode ser reduzido) e cura outra criatura pelo <strong>dobro do dano sofrido</strong>."},
  {nome:"🌀 Muralha de Areia (Wall of Sand)",nivel:3,escola:"Evocação",tempo:"1 Ação",alcance:"27m",componentes:"V, S, M (punhado de areia)",duracao:"Concentração, até 10 min",classes:["mago","druida"],descricao:"Parede de areia giratória (9m comp, 6m altura, 3m espessura). Bloqueia visão total, criaturas que atravessam sofrem <strong>3d8 de dano cortante</strong> e ficam cegas por 1 rodada (CON)."},
  {nome:"💫 Lentidão (Slow)",nivel:3,escola:"Transmutação",tempo:"1 Ação",alcance:"36m",componentes:"V, S, M (gota de melado)",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro"],descricao:"Até 6 criaturas em cubo de 12m ficam lentas: CA-2, desvantagem em DES, metade do deslocamento, sem reações, 50% de chance de magias levarem 2 turnos."},
  {nome:"🦋 Pele de Pedra (Stoneskin)",nivel:3,escola:"Abjuração",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (diamante 100po)",duracao:"Concentração, até 1 hora",classes:["mago","druida","artifice"],descricao:"Criatura tocada ganha <strong>resistência a dano não-mágico de concussão, perfurante e cortante</strong>. O diamante é consumido."},
  {nome:"🔵 Invocar Elemental Menor (Conjure Minor Elementals)",nivel:3,escola:"Conjuração",tempo:"1 Minuto",alcance:"27m",componentes:"V, S",duracao:"Concentração, até 1 hora",classes:["mago","druida"],descricao:"Invoca elementais de ND 2 ou inferior: 1 de ND 2, 2 de ND 1, 4 de ND 1/2 ou 8 de ND 1/4. Eles obedecem comandos verbais."},
  {nome:"🐺 Invocar Animais (Conjure Animals)",nivel:3,escola:"Conjuração",tempo:"1 Ação",alcance:"18m",componentes:"V, S",duracao:"Concentração, até 1 hora",classes:["druida","patrulheiro"],descricao:"Invoca bestas feéricas: 1 de ND 2, 2 de ND 1, 4 de ND 1/2 ou 8 de ND 1/4. Obedecem comandos verbais. +1 besta por nível acima."},
  {nome:"🔥 Seta de Fogo (Flame Arrows)",nivel:3,escola:"Transmutação",tempo:"1 Ação",alcance:"Toque",componentes:"V, S",duracao:"Concentração, até 1 hora",classes:["mago","druida","patrulheiro","artifice"],descricao:"Aljava tocada: 12 flechas/munições se tornam flamejantes. Causam <strong>1d6 de dano de fogo extra</strong> ao atingir. O fogo não queima o portador nem a aljava."},
  {nome:"🗡️ Arma Elemental (Elemental Weapon)",nivel:3,escola:"Transmutação",tempo:"1 Ação",alcance:"Toque",componentes:"V, S",duracao:"Concentração, até 1 hora",classes:["mago","druida","paladino","artifice"],descricao:"Arma tocada se torna +1 e ganha <strong>1d4 de dano elemental extra</strong> (ácido, frio, fogo, elétrico ou trovão). Bônus +2 e 2d4 com slot de 5º, +3 e 3d4 com slot de 7º."},
  {nome:"💨 Rajada Curativa em Massa (Mass Healing Word)",nivel:3,escola:"Abjuração",tempo:"1 Ação Bônus",alcance:"18m",componentes:"V",duracao:"Instantânea",classes:["clerigo"],descricao:"Até 6 criaturas visíveis recuperam <strong>1d4 + mod de Sabedoria</strong> PV cada. Não afeta mortos-vivos ou construtos. +1d4 por nível acima."},
  {nome:"👁️ Visão Arcana (Arcane Sight)",nivel:3,escola:"Adivinhação",tempo:"1 Ação",alcance:"Pessoal",componentes:"V, S",duracao:"Concentração, até 10 min",classes:["mago","feiticeiro","bruxo"],descricao:"Você vê auras mágicas em criaturas e objetos a 36m, identificando escolas de magia e intensidade. Detecta itens mágicos e criaturas sob efeitos mágicos."},
  {nome:"💀 Necromancia Menor (Speak with Dead)",nivel:3,escola:"Necromancia",tempo:"1 Ação",alcance:"3m",componentes:"V, S, M (incenso)",duracao:"10 minutos",classes:["clerigo","bard"],descricao:"Confere animação a um cadáver. Pode fazer 5 perguntas. O cadáver sabe apenas o que sabia em vida. Não funciona em mortos-vivos ou corpos muito danificados."},
  {nome:"🌪️ Passo do Vento (Wind Walk)",nivel:3,escola:"Transmutação",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (sementes aladas)",duracao:"Concentração, até 10 min",classes:["druida"],descricao:"Você e aliados tocados se transformam em névoa gasosa. Podem voar 90m por rodada e passar por fendas minúsculas. Não podem atacar ou conjurar."},
  {nome:"🛡️ Guardião Espiritual (Spirit Guardians)",nivel:3,escola:"Conjuração",tempo:"1 Ação",alcance:"Pessoal (4,5m raio)",componentes:"V, S, M (símbolo sagrado)",duracao:"Concentração, até 10 min",classes:["clerigo"],descricao:"Espíritos guardiões flutuam ao seu redor. Criaturas à sua escolha na área têm deslocamento reduzido à metade e sofrem <strong>3d8 de dano radiante ou necrótico</strong> (SAB metade). +1d8 por nível."},
  // ==================== NÍVEL 4 - 35 MAGIAS ====================
  {nome:"👁️ Invisibilidade Maior (Greater Invisibility)",nivel:4,escola:"Ilusão",tempo:"1 Ação",alcance:"Toque",componentes:"V, S",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro","bard"],descricao:"Você ou criatura tocada ficam completamente invisíveis. Ao contrário da invisibilidade padrão, <strong>esta magia não se quebra</strong> se o alvo atacar ou conjurar magias."},
  {nome:"🧱 Muralha de Fogo (Wall of Fire)",nivel:4,escola:"Evocação",tempo:"1 Ação",alcance:"36m",componentes:"V, S, M (fósforo)",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro","druida"],descricao:"Parede de fogo de 18m comp, 6m altura, 30cm espessura. Lado quente: <strong>5d8 de dano de fogo</strong> a 3m. Dentro da parede: 5d8. +1d8 por nível acima."},
  {nome:"💀 Assombrar (Blight)",nivel:4,escola:"Necromancia",tempo:"1 Ação",alcance:"9m",componentes:"V, S",duracao:"Instantânea",classes:["mago","druida","feiticeiro","bruxo"],descricao:"Drena umidade vital de uma criatura. <strong>8d8 de dano necrótico</strong>, metade se passar em CON. Plantas e elementais de água têm desvantagem e sofrem dano máximo (64). +1d8 por nível."},
  {nome:"🌀 Evocar Elemental (Conjure Elemental)",nivel:4,escola:"Conjuração",tempo:"1 Minuto",alcance:"27m",componentes:"V, S, M (incenso)",duracao:"Concentração, até 1 hora",classes:["mago","druida"],descricao:"Invoca um elemental (ar, terra, fogo ou água) de ND 5. Obedece comandos verbais. Se perder concentração, o elemental se torna hostil e tenta atacar você."},
  {nome:"🦅 Polimorfia (Polymorph)",nivel:4,escola:"Transmutação",tempo:"1 Ação",alcance:"18m",componentes:"V, S, M (casulo de lagarta)",duracao:"Concentração, até 1 hora",classes:["mago","druida","feiticeiro","bard"],descricao:"Transforma uma criatura em outra besta de ND igual ou menor. Assume estatísticas completas da nova forma. Retorna à forma original ao chegar a 0 PV."},
  {nome:"🔮 Confusão (Confusion)",nivel:4,escola:"Encantamento",tempo:"1 Ação",alcance:"27m",componentes:"V, S, M (três nozes)",duracao:"Concentração, até 1 min",classes:["mago","druida","feiticeiro","bard"],descricao:"Criaturas em esfera de 3m ficam confusas. No início de cada turno, role d10: 1-age normalmente, 2-6 não faz nada, 7-8 ataca aleatório, 9-10 foge. Repetem teste de SAB no fim do turno."},
  {nome:"🛡️ Pele de Pedra (Stoneskin)",nivel:4,escola:"Abjuração",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (diamante 100po)",duracao:"Concentração, até 1 hora",classes:["mago","druida","artifice"],descricao:"Criatura tocada ganha <strong>resistência a dano não-mágico de concussão, perfurante e cortante</strong>. O diamante é consumido."},
  {nome:"💧 Controlar Água (Control Water)",nivel:4,escola:"Transmutação",tempo:"1 Ação",alcance:"90m",componentes:"V, S, M (gota d'água)",duracao:"Concentração, até 10 min",classes:["mago","druida","clerigo"],descricao:"Controla água em cubo de 30m: criar redemoinho (2d8 de dano, puxa), inundar área, dividir águas como Moisés, ou criar correnteza."},
  {nome:"🔥 Tempestade de Fogo (Ice Storm)",nivel:4,escola:"Evocação",tempo:"1 Ação",alcance:"90m",componentes:"V, S, M (pó de cristal)",duracao:"Instantânea",classes:["mago","druida","feiticeiro"],descricao:"Granizo e chuva congelante em cilindro de 12m raio, 12m altura. <strong>2d8 de dano de contusão + 4d6 de dano de frio</strong> (DES metade). Terreno fica difícil."},
  {nome:"⚰️ Guardião da Fé (Guardian of Faith)",nivel:4,escola:"Conjuração",tempo:"1 Ação",alcance:"9m",componentes:"V",duracao:"8 horas",classes:["clerigo"],descricao:"Invoca guardião espectral que protege área. Até causar 60 de dano total ou 10 ataques, ataca hostis que entram em raio de 3m: <strong>20 de dano radiante</strong> (DES metade)."},
  {nome:"🌱 Vinhas Esmagadoras (Grasping Vine)",nivel:4,escola:"Conjuração",tempo:"1 Ação Bônus",alcance:"9m",componentes:"V, S",duracao:"Concentração, até 1 min",classes:["druida","patrulheiro"],descricao:"Vinha gigante puxa criatura a até 9m para perto de si. Ação bônus para comandar. Pode agarrar e causar <strong>4d6 de dano de contusão</strong> por turno."},
  {nome:"👻 Assassino Fantasmagórico (Phantasmal Killer)",nivel:4,escola:"Ilusão",tempo:"1 Ação",alcance:"36m",componentes:"V, S",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro","bruxo"],descricao:"Cria ilusão do pior medo do alvo. Teste de SAB inicial: se falhar, fica <strong>amedrontado</strong>. A cada turno seguinte: teste de SAB ou sofre <strong>4d10 de dano psíquico</strong>. Se passar, magia termina."},
  {nome:"🦋 Porta Dimensional (Dimension Door)",nivel:4,escola:"Conjuração",tempo:"1 Ação",alcance:"150m",componentes:"V",duracao:"Instantânea",classes:["mago","feiticeiro","bard","bruxo"],descricao:"Teletransporta você e uma criatura voluntária tocada para qualquer ponto visível ou descrito no alcance. Pode levar objetos que consiga carregar. Se o local estiver ocupado, sofre 4d6 de dano de força."},
  {nome:"🎯 Localizar Criatura (Locate Creature)",nivel:4,escola:"Adivinhação",tempo:"1 Ação",alcance:"Pessoal",componentes:"V, S, M (pele de cão)",duracao:"Concentração, até 1 hora",classes:["mago","clerigo","druida","paladino","patrulheiro","bard"],descricao:"Sente direção e distância de criatura específica ou tipo de criatura (ex: dragão) a até 300m. Não atravessa água corrente com 3m+ de largura."},
  {nome:"🔵 Invocar Aberração (Summon Aberration)",nivel:4,escola:"Conjuração",tempo:"1 Ação",alcance:"27m",componentes:"V, S, M (glândula de horror)",duracao:"Concentração, até 1 hora",classes:["mago","bruxo"],descricao:"Invoca espírito aberrante em forma bestial. Causa 1d8 + 3 + nível da magia de dano. Escolha entre forma Olho (distância, psíquico), Garra (corpo a corpo, cortante) ou Tentáculo (agarra)."},
  {nome:"💫 Invocar Construto (Summon Construct)",nivel:4,escola:"Conjuração",tempo:"1 Ação",alcance:"27m",componentes:"V, S, M (coração de pedra)",duracao:"Concentração, até 1 hora",classes:["mago","artifice"],descricao:"Invoca espírito construto em corpo metálico. Causa 1d8 + 3 + nível da magia de dano de concussão. Escolha entre forma Argila (defesa, cura), Metal (ataque múltiplo) ou Pedra (resistente)."},
  {nome:"🔥 Invocar Elemental Menor (Summon Elemental)",nivel:4,escola:"Conjuração",tempo:"1 Ação",alcance:"27m",componentes:"V, S, M (essência elemental)",duracao:"Concentração, até 1 hora",classes:["mago","druida","feiticeiro"],descricao:"Invoca espírito elemental. CA 11 + nível, PV 50 + 10/nível. Ataque: 1d10 + 3 + nível de dano (tipo conforme elemento). Escolha Ar (voo, ataque à distância), Terra (resistente, área), Fogo (dano extra) ou Água (agarrão)."},
  {nome:"🦅 Invocar Besta (Summon Beast)",nivel:4,escola:"Conjuração",tempo:"1 Ação",alcance:"27m",componentes:"V, S, M (pena/pelo)",duracao:"Concentração, até 1 hora",classes:["druida","patrulheiro"],descricao:"Invoca besta espiritual. CA 11 + nível, PV 20 + 5/nível. Ataque: 1d8 + 4 + nível de dano. Escolha Ar (voo, ataque com investida), Terra (corrida rápida) ou Água (natação, respiração aquática)."},
  {nome:"🗡️ Arma Arcana (Arcane Sword)",nivel:4,escola:"Evocação",tempo:"1 Ação",alcance:"18m",componentes:"V, S, M (espada miniatura 250po)",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro","bard"],descricao:"Espada espectral ataca automaticamente criatura a até 1,5m: <strong>3d10 de dano de força</strong> por rodada como Ação Bônus. Pode trocar de alvo. Flutua e persegue."},
  {nome:"🌑 Tentáculos Negros (Evard's Black Tentacles)",nivel:4,escola:"Conjuração",tempo:"1 Ação",alcance:"27m",componentes:"V, S, M (tentáculo de lula)",duracao:"Concentração, até 1 min",classes:["mago","bruxo"],descricao:"Tentáculos negros preenchem quadrado de 6m. Criaturas na área fazem teste de DES ou ficam <strong>impedidas</strong>. Início do turno na área: <strong>3d6 de dano de contusão</strong> (agarradas) ou 1d6 (livres)."},
  {nome:"🔮 Adivinhação (Divination)",nivel:4,escola:"Adivinhação",tempo:"1 Ação (Ritual)",alcance:"Pessoal",componentes:"V, S, M (incenso 25po)",duracao:"Instantânea",classes:["clerigo"],descricao:"Faz uma pergunta sobre evento nos próximos 7 dias. Recebe resposta curta, frase enigmática ou presságio. Acumulativo: 25% de falha cumulativa a cada uso antes de descanso longo."},
  {nome:"💀 Necromancia Aprimorada (Shadow of Moil)",nivel:4,escola:"Necromancia",tempo:"1 Ação",alcance:"Pessoal",componentes:"V, S, M (olho de morto-vivo)",duracao:"Concentração, até 1 min",classes:["bruxo"],descricao:"Seu corpo se envolve em sombras flamejantes. Você fica <strong>fortemente obscurecido</strong>. Criaturas que o atingem corpo a corpo sofrem <strong>2d8 de dano necrótico</strong>. Resistência a dano radiante."},
  {nome:"🛡️ Aura de Pureza (Aura of Purity)",nivel:4,escola:"Abjuração",tempo:"1 Ação",alcance:"Pessoal (9m raio)",componentes:"V",duracao:"Concentração, até 10 min",classes:["clerigo","paladino"],descricao:"Aura purificadora. Aliados na área não podem ficar doentes, envenenados ou amedrontados. Resistência a veneno. Vantagem em testes contra estas condições."},
  {nome:"🔥 Aura de Vida (Aura of Life)",nivel:4,escola:"Abjuração",tempo:"1 Ação",alcance:"Pessoal (9m raio)",componentes:"V",duracao:"Concentração, até 10 min",classes:["clerigo","paladino"],descricao:"Aura vitalizante. Aliados na área não podem ter PV máximos reduzidos. Recuperam 1 PV no início de cada turno se estiverem com menos da metade. Imunidade a dano necrótico que reduz PV máximo."},
  {nome:"💧 Banimento (Banishment)",nivel:4,escola:"Abjuração",tempo:"1 Ação",alcance:"18m",componentes:"V, S, M (item repugnante)",duracao:"Concentração, até 1 min",classes:["mago","clerigo","feiticeiro","paladino","bruxo"],descricao:"Criatura visível falha em CAR e é banida para semiplano inofensivo. Se nativa de outro plano, volta para seu plano natal e não retorna se a concentração durar 1 minuto. +1 alvo por nível."},
  {nome:"🧟 Criar Mortos-Vivos (Create Undead)",nivel:4,escola:"Necromancia",tempo:"1 Minuto",alcance:"3m",componentes:"V, S, M (ônix 150po por cadáver)",duracao:"24 horas",classes:["mago","clerigo","bruxo"],descricao:"Cria 3 carniçais a partir de cadáveres. Obedecem comandos verbais. Pode reafirmar controle a cada 24h. Com slot 5º: 5 carniçais ou 2 ghasts. 6º: 3 ghasts ou 2 wights."},
  {nome:"🌀 Compulsão (Compulsion)",nivel:4,escola:"Encantamento",tempo:"1 Ação",alcance:"9m",componentes:"V, S",duracao:"Concentração, até 1 min",classes:["bard"],descricao:"Criaturas em raio de 9m falham em SAB e devem usar todo seu deslocamento para se mover na direção escolhida por você a cada turno. Não podem sofrer dano direto da direção."},
  {nome:"💫 Esfera Resiliente (Otiluke's Resilient Sphere)",nivel:4,escola:"Evocação",tempo:"1 Ação",alcance:"9m",componentes:"V, S, M (esfera de cristal)",duracao:"Concentração, até 1 min",classes:["mago","artifice"],descricao:"Criatura Grande ou menor é envolvida em esfera de força cintilante. Nada pode entrar ou sair. A esfera é imune a dano. Criatura pode rolar para se mover, mas fica presa."},
  {nome:"🔵 Porta Dimensional (Dimension Door)",nivel:4,escola:"Conjuração",tempo:"1 Ação",alcance:"150m",componentes:"V",duracao:"Instantânea",classes:["mago","feiticeiro","bard","bruxo"],descricao:"Teletransporta você e uma criatura voluntária para ponto visível ou especificado no alcance. Sofre 4d6 de dano de força se o local estiver ocupado."},
  {nome:"🌿 Manto da Natureza (Grasping Vine)",nivel:4,escola:"Conjuração",tempo:"1 Ação Bônus",alcance:"9m",componentes:"V, S",duracao:"Concentração, até 1 min",classes:["druida","patrulheiro"],descricao:"Vinha gigante agarra criatura e pode puxá-la. Comando com ação bônus. Ataque: + seu mod de SAB para acertar. Agarrão: criatura fica impedida e sofre 4d6 de dano de contusão por turno."},
  {nome:"🦅 Voo (Fly)",nivel:4,escola:"Transmutação",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (asa)",duracao:"Concentração, até 10 min",classes:["mago","feiticeiro","artifice"],descricao:"Até 2 criaturas ganham <strong>velocidade de voo de 18m</strong>. +1 alvo por nível acima do 4º."},
  {nome:"💥 Esfera de Fogo (Fire Shield)",nivel:4,escola:"Evocação",tempo:"1 Ação",alcance:"Pessoal",componentes:"V, S, M (fósforo)",duracao:"10 minutos",classes:["mago","feiticeiro","bruxo"],descricao:"Escudo de fogo ou gelo. Resistência a dano de frio ou fogo (oposto ao escolhido). Criaturas que o atingirem corpo a corpo sofrem <strong>2d8 de dano de fogo ou frio</strong>. Emite luz de 3m."},
  // ==================== NÍVEL 5 - 30 MAGIAS ====================
  {nome:"🌪️ Onda Destrutiva (Destructive Wave)",nivel:5,escola:"Evocação",tempo:"1 Ação",alcance:"Pessoal (9m raio)",componentes:"V",duracao:"Instantânea",classes:["paladino","clerigo"],descricao:"Você golpeia o chão, criando uma onda de força divina. Criaturas hostis a até 9m sofrem <strong>5d6 de dano de força + 5d6 de dano radiante</strong> (CON metade) e são derrubadas no chão se falharem."},
  {nome:"🌌 Névoa Mental (Mind Fog)",nivel:5,escola:"Encantamento",tempo:"1 Ação",alcance:"36m",componentes:"V, S",duracao:"Concentração, até 30 min",classes:["mago","bard","feiticeiro"],descricao:"Névoa esmeralda em esfera de 6m de raio. Criaturas que falharem em SAB têm <strong>desvantagem em testes de Sabedoria e salvaguardas de Sabedoria</strong> enquanto estiverem na névoa."},
  {nome:"💀 Nuvem Mortal (Cloudkill)",nivel:5,escola:"Conjuração",tempo:"1 Ação",alcance:"36m",componentes:"V, S",duracao:"Concentração, até 10 min",classes:["mago","feiticeiro"],descricao:"Nuvem de gás venenoso em esfera de 6m de raio. Criaturas na área sofrem <strong>5d8 de dano de veneno</strong> ao entrar ou começar turno (CON metade). A nuvem se move 3m por turno. +1d8 por nível."},
  {nome:"🧠 Dominar Pessoa (Dominate Person)",nivel:5,escola:"Encantamento",tempo:"1 Ação",alcance:"18m",componentes:"V, S",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro","bard"],descricao:"Humanóide visível falha em SAB e fica <strong>dominado</strong>. Você controla telepaticamente suas ações. Repete teste ao sofrer dano. +1 alvo por nível acima. Duração 10 min com slot 6º, 1h com 7º, 8h com 8º."},
  {nome:"🧱 Muralha de Força (Wall of Force)",nivel:5,escola:"Evocação",tempo:"1 Ação",alcance:"36m",componentes:"V, S, M (pó de rubi)",duracao:"Concentração, até 10 min",classes:["mago"],descricao:"Parede invisível de força pura. Imune a dano, intransponível fisicamente. Pode ser esférica (aprisiona) ou plana (até 10 painéis de 3m). Dissipada apenas por Desintegrar."},
  {nome:"🦅 Imobilizar Monstro (Hold Monster)",nivel:5,escola:"Encantamento",tempo:"1 Ação",alcance:"18m",componentes:"V, S, M (ferro)",duracao:"Concentração, até 1 min",classes:["mago","clerigo","feiticeiro","druida","bard","bruxo"],descricao:"Criatura visível fica <strong>paralisada</strong> se falhar em SAB. Funciona em qualquer tipo de criatura. Repete teste no fim de cada turno. +1 alvo por nível acima."},
  {nome:"💫 Reviver os Mortos (Raise Dead)",nivel:5,escola:"Necromancia",tempo:"1 Hora",alcance:"Toque",componentes:"V, S, M (diamante 500po)",duracao:"Instantânea",classes:["clerigo","paladino","bard"],descricao:"Traz criatura morta há até 10 dias de volta à vida. Volta com 1 PV. Não cura doenças, venenos ou maldições ativas. Não recupera partes do corpo perdidas. Penalidade: -4 em jogadas até 4 descansos longos."},
  {nome:"🔮 Contatar Plano (Contact Other Plane)",nivel:5,escola:"Adivinhação",tempo:"1 Minuto (Ritual)",alcance:"Pessoal",componentes:"V",duracao:"1 minuto",classes:["mago","bruxo"],descricao:"Contata entidade de outro plano. Faça 5 perguntas de uma palavra (sim/não). Teste de INT CD 15: se falhar, sofre 6d6 de dano psíquico e fica insano até descanso longo. Acumulativo: CD aumenta."},
  {nome:"🔥 Imolação (Immolation)",nivel:5,escola:"Evocação",tempo:"1 Ação",alcance:"27m",componentes:"V",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro"],descricao:"Criatura é envolta em chamas mágicas. Sofre <strong>8d6 de dano de fogo</strong> inicial (DES metade). A cada turno seguinte: 4d6 de fogo (DES metade). Se morrer, vira cinzas. +1d6 por nível."},
  {nome:"🌊 Maremoto (Tidal Wave)",nivel:5,escola:"Conjuração",tempo:"1 Ação",alcance:"36m",componentes:"V, S, M (gota d'água)",duracao:"Instantânea",classes:["druida","feiticeiro","mago"],descricao:"Onda de água de 9m comp, 6m largura, 3m altura avança. Criaturas sofrem <strong>4d8 de dano de contusão</strong> (FOR metade) e são derrubadas se falharem. Apaga chamas não mágicas."},
  {nome:"🔵 Convocar Elemental Maior (Conjure Elemental)",nivel:5,escola:"Conjuração",tempo:"1 Minuto",alcance:"27m",componentes:"V, S, M (incenso)",duracao:"Concentração, até 1 hora",classes:["mago","druida"],descricao:"Invoca elemental de ND 5 (ar, terra, fogo, água). Obedece comandos verbais. Se concentração quebrar, torna-se hostil e ataca você."},
  {nome:"💀 Dança Macabra (Danse Macabre)",nivel:5,escola:"Necromancia",tempo:"1 Ação",alcance:"18m",componentes:"V, S",duracao:"Concentração, até 1 hora",classes:["mago","bruxo"],descricao:"Anima 5 cadáveres como esqueletos ou zumbis temporários. Eles ganham +seu mod de conjuração em ataque e dano. Obedecem imediatamente. Viram pó ao fim da magia."},
  {nome:"🛡️ Círculo de Teletransporte (Teleportation Circle)",nivel:5,escola:"Conjuração",tempo:"1 Minuto",alcance:"3m",componentes:"V, M (giz raro 50po)",duracao:"1 rodada",classes:["mago","feiticeiro","bard"],descricao:"Inscreve círculo de 3m que se conecta a círculo permanente conhecido. Portais abertos por 6 segundos (1 rodada). Criaturas podem atravessar. Conjurar diariamente por 1 ano no mesmo local torna-o permanente."},
  {nome:"🌑 Passagem Sombria (Passwall)",nivel:5,escola:"Transmutação",tempo:"1 Ação",alcance:"9m",componentes:"V, S, M (semente de gergelim)",duracao:"1 hora",classes:["mago"],descricao:"Abre passagem temporária através de madeira, gesso ou pedra. Túnel de até 6m de profundidade, 1,5m de largura. Não afeta metal ou outras substâncias."},
  {nome:"🌀 Telecinese (Telekinesis)",nivel:5,escola:"Transmutação",tempo:"1 Ação",alcance:"18m",componentes:"V, S",duracao:"Concentração, até 10 min",classes:["mago","feiticeiro"],descricao:"Move criatura ou objeto com a mente. Objeto até 500kg: move 9m. Criatura: teste de FOR resistido, move 9m se falhar. Pode segurar criatura no ar (impedida) ou arremessá-la (3d6 de dano por 9m)."},
  {nome:"🔥 Consagrar (Hallow)",nivel:5,escola:"Evocação",tempo:"24 Horas",alcance:"Toque",componentes:"V, S, M (ervas 1000po)",duracao:"Até ser dissipado",classes:["clerigo"],descricao:"Santifica área de 18m de raio. Escolha um efeito extra: impedir entrada de certos tipos de criatura, silêncio, escuridão, medo em inimigos, ou proteção contra possessão. Dura até ser dissipado."},
  {nome:"🌿 Despertar (Awaken)",nivel:5,escola:"Transmutação",tempo:"8 Horas",alcance:"Toque",componentes:"V, S, M (ágata 1000po)",duracao:"Instantânea",classes:["druida","bard"],descricao:"Concede inteligência 10 a uma besta ou árvore. Ganha capacidade de falar um idioma que você conhece. A besta fica enfeitiçada por você por 30 dias ou até você prejudicá-la."},
  {nome:"🐉 Ligação Planar (Planar Binding)",nivel:5,escola:"Abjuração",tempo:"1 Hora",alcance:"18m",componentes:"V, S, M (joia 1000po)",duracao:"24 horas",classes:["mago","clerigo","druida","feiticeiro","bard"],descricao:"Aprisiona celestial, elemental, fada ou infernal. A criatura falha em CAR e serve você pela duração. Com slot 6º: 10 dias. 7º: 30 dias. 8º: 180 dias. 9º: 1 ano e 1 dia."},
  {nome:"🧊 Cilindro de Gelo (Cone of Cold)",nivel:5,escola:"Evocação",tempo:"1 Ação",alcance:"Pessoal (cone 18m)",componentes:"V, S, M (cone de vidro)",duracao:"Instantânea",classes:["mago","feiticeiro","druida"],descricao:"Jato de frio ártico em cone de 18m. Criaturas sofrem <strong>8d8 de dano de frio</strong> (CON metade). Criaturas que falharem por 5+ ficam congeladas por 1 minuto (paralisadas, CON para sair). +1d8 por nível."},
  {nome:"🔮 Visão Remota (Scrying)",nivel:5,escola:"Adivinhação",tempo:"10 Minutos",alcance:"Pessoal",componentes:"V, S, M (foco 1000po)",duracao:"Concentração, até 10 min",classes:["mago","clerigo","druida","feiticeiro","bard","bruxo"],descricao:"Espiona criatura em qualquer plano. Teste de SAB do alvo CD sua magia: falha, você vê e ouve a 3m dela por 10 minutos. Bônus de -5 a +5 dependendo de quão bem conhece o alvo."},
  {nome:"⚡ Cólera da Natureza (Wrath of Nature)",nivel:5,escola:"Evocação",tempo:"1 Ação",alcance:"36m",componentes:"V, S",duracao:"Concentração, até 1 min",classes:["druida","patrulheiro"],descricao:"Árvores, pedras e grama em cubo de 18m atacam seus inimigos. Ataque corpo a corpo: +seu mod de SAB, 4d6 de dano cortante/contusão. Terreno difícil. 3 ataques por turno."},
  {nome:"💨 Viagem Arborescente (Tree Stride)",nivel:5,escola:"Conjuração",tempo:"1 Ação",alcance:"Pessoal",componentes:"V, S",duracao:"Concentração, até 1 min",classes:["druida","patrulheiro"],descricao:"Você entra em árvore e sai por outra da mesma espécie a até 150m. Pode usar movimento para viajar entre árvores uma vez por turno. Termina na última árvore."},
  {nome:"💀 Energia Negativa (Negative Energy Flood)",nivel:5,escola:"Necromancia",tempo:"1 Ação",alcance:"18m",componentes:"V, S, M (osso quebrado)",duracao:"Instantânea",classes:["mago","bruxo"],descricao:"Jato de energia negativa. Alvo sofre <strong>5d12 de dano necrótico</strong> (CON metade). Se matar humanoide, levanta como zumbi no próximo turno, controlado por você até o fim da batalha."},
  {nome:"🕯️ Chama Eterna (Eternal Flame)",nivel:5,escola:"Evocação",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (rubi 500po)",duracao:"Até ser dissipado",classes:["clerigo","druida"],descricao:"Cria chama mágica permanente que não consome oxigênio, não queima o que toca e não apaga com água. Emite luz de tocha. Pode ter cor escolhida."},
  {nome:"🔮 Conhecimento Lendário (Legend Lore)",nivel:5,escola:"Adivinhação",tempo:"10 Minutos",alcance:"Pessoal",componentes:"V, S, M (incenso 250po)",duracao:"Instantânea",classes:["mago","clerigo","bard"],descricao:"Recebe informações sobre pessoa, local ou objeto lendário. Quanto mais famoso, mais detalhes. Revela segredos, histórias esquecidas e fraquezas ocultas."},
  {nome:"🌊 Controlar os Ventos (Control Winds)",nivel:5,escola:"Transmutação",tempo:"1 Ação",alcance:"90m",componentes:"V, S",duracao:"Concentração, até 1 hora",classes:["druida","feiticeiro","mago"],descricao:"Controla vento em cubo de 30m. Pode criar rajadas (empurram, dificultam voo), redemoinhos (2d8 de dano, levantam), ou acalmar ventos (protege área). Ação bônus para mudar efeito."},
  {nome:"🦅 Visão da Verdade (True Seeing)",nivel:5,escola:"Adivinhação",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (pomada 25po)",duracao:"1 hora",classes:["mago","clerigo","feiticeiro","bard","bruxo"],descricao:"Criatura tocada ganha <strong>Visão Verdadeira</strong>: vê através de escuridão mágica, ilusões, portas secretas, formas verdadeiras de metamorfos e criaturas no Plano Etéreo."},
  {nome:"💫 Mão de Magia (Bigby's Hand)",nivel:5,escola:"Evocação",tempo:"1 Ação",alcance:"36m",componentes:"V, S, M (luva de cobra)",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro","artifice"],descricao:"Mão de força gigante (CA 20, PV igual seus PV máximos). Ação bônus para mover 18m. Pode esmagar (4d8 de força), empurrar (FOR resistido, empurra 1,5m+), agarrar ou bloquear (cobertura)."},
  {nome:"🗡️ Animar Objetos (Animate Objects)",nivel:5,escola:"Transmutação",tempo:"1 Ação",alcance:"36m",componentes:"V, S",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro","bard","artifice"],descricao:"Anima 10 objetos não mágicos. Ação bônus para comandar. Tamanho determina estatísticas: Tiny (CA 18, +8 ataque, 1d4+4 dano) a Enorme (CA 10, +8 ataque, 2d12+4 dano)."},
  {nome:"💨 Restauração Maior (Greater Restoration)",nivel:5,escola:"Abjuração",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (pó de diamante 100po)",duracao:"Instantânea",classes:["clerigo","druida","bard","artifice"],descricao:"Remove exaustão, charme, petrificação, maldição, redução de atributo ou redução de PV máximo. Cura um efeito por conjuração."},
  // ==================== NÍVEL 6 - 25 MAGIAS ====================
  {nome:"🌀 Desintegrar (Disintegrate)",nivel:6,escola:"Transmutação",tempo:"1 Ação",alcance:"18m",componentes:"V, S, M (ímã)",duracao:"Instantânea",classes:["mago","feiticeiro"],descricao:"Raio verde fino atinge criatura ou objeto. Alvo sofre <strong>10d6 + 40 de dano de força</strong> (DES metade). Se reduzir a 0 PV, vira pó cinza. Destrói automaticamente objetos não mágicos Grandes ou menores. +3d6 por nível."},
  {nome:"☀️ Raio de Sol (Sunbeam)",nivel:6,escola:"Evocação",tempo:"1 Ação",alcance:"Pessoal (linha 18m)",componentes:"V, S, M (lupa)",duracao:"Concentração, até 1 min",classes:["druida","mago","feiticeiro","clerigo"],descricao:"Feixe de luz radiante. Criaturas na linha sofrem <strong>6d8 de dano radiante</strong> e ficam cegas por 1 minuto (CON metade e sem cegueira). Ação para disparar novo feixe a cada turno. Mortos-vivos têm desvantagem."},
  {nome:"💀 Círculo da Morte (Circle of Death)",nivel:6,escola:"Necromancia",tempo:"1 Ação",alcance:"45m",componentes:"V, S, M (pérola negra 500po)",duracao:"Instantânea",classes:["mago","feiticeiro","bruxo"],descricao:"Onda de energia necrótica em esfera de 18m de raio. Criaturas sofrem <strong>8d6 de dano necrótico</strong> (CON metade). +2d6 por nível acima."},
  {nome:"🧠 Sugestão em Massa (Mass Suggestion)",nivel:6,escola:"Encantamento",tempo:"1 Ação",alcance:"18m",componentes:"V, M (língua de cobra)",duracao:"24 horas",classes:["mago","feiticeiro","bard","bruxo"],descricao:"Até 12 criaturas que falhem em SAB seguem sugestão de 1-2 frases. Ex: Entreguem suas armas ao cavaleiro. Ações obviamente suicidas quebram o efeito."},
  {nome:"🦅 Cura Completa (Heal)",nivel:6,escola:"Abjuração",tempo:"1 Ação",alcance:"18m",componentes:"V, S",duracao:"Instantânea",classes:["clerigo","druida"],descricao:"Cura <strong>70 pontos de vida</strong> e remove cegueira, surdez e doenças. Não afeta mortos-vivos ou construtos. +10 PV por nível acima."},
  {nome:"🌪️ Tempestade de Vingança (Investiture of Wind)",nivel:6,escola:"Transmutação",tempo:"1 Ação",alcance:"Pessoal",componentes:"V, S",duracao:"Concentração, até 10 min",classes:["druida","feiticeiro","mago"],descricao:"Você se envolve em vento. Voa 18m, ataque à distância têm desvantagem contra você. Ação: linha de vento 18m (4d6 de dano, empurra 4,5m). Imunidade a dano de trovão."},
  {nome:"🔥 Investidura de Chamas (Investiture of Flame)",nivel:6,escola:"Transmutação",tempo:"1 Ação",alcance:"Pessoal",componentes:"V, S",duracao:"Concentração, até 10 min",classes:["druida","feiticeiro","mago"],descricao:"Corpo envolto em chamas. Imunidade a fogo, resistência a frio. Criaturas a 1,5m sofrem 3d10 de fogo ao te atingir. Ação: linha de fogo 9m (4d8 de dano)."},
  {nome:"🧊 Investidura de Gelo (Investiture of Ice)",nivel:6,escola:"Transmutação",tempo:"1 Ação",alcance:"Pessoal",componentes:"V, S",duracao:"Concentração, até 10 min",classes:["druida","feiticeiro","mago"],descricao:"Armadura de gelo. Imunidade a frio, resistência a fogo. Terreno difícil num raio de 3m. Ação: cone de gelo 4,5m (4d6 de dano, CON ou velocidade reduzida)."},
  {nome:"🗿 Carne para Pedra (Flesh to Stone)",nivel:6,escola:"Transmutação",tempo:"1 Ação",alcance:"18m",componentes:"V, S, M (cal virgem)",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro","bruxo"],descricao:"Criatura falha em CON e fica <strong>impedida</strong>. Se falhar 3 testes no total (repetidos a cada turno), vira pedra permanentemente. Se passar 3 vezes, magia termina."},
  {nome:"👁️ Visão Verdadeira (True Seeing)",nivel:6,escola:"Adivinhação",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (pomada 25po)",duracao:"1 hora",classes:["mago","clerigo","feiticeiro","bard","bruxo"],descricao:"Concede visão verdadeira: vê escuridão mágica, portas secretas, ilusões, formas originais, criaturas etéreas e invisíveis a 36m."},
  {nome:"⚰️ Criar Mortos-Vivos Maior (Create Undead)",nivel:6,escola:"Necromancia",tempo:"1 Minuto",alcance:"3m",componentes:"V, S, M (ônix 150po/cadáver)",duracao:"24 horas",classes:["mago","clerigo","bruxo"],descricao:"Cria 3 ghouls ou 2 ghasts ou 2 wights de cadáveres. Obedecem comandos. Reafirma controle a cada 24h. Slot 7º: 4 ghouls/3 ghasts. Slot 8º: 6 ghouls/4 ghasts/3 wights. Slot 9º: 8 ghouls/6 ghasts/4 wights/2 múmias."},
  {nome:"🌍 Mover Terra (Move Earth)",nivel:6,escola:"Transmutação",tempo:"1 Ação",alcance:"36m",componentes:"V, S, M (pá de ferro)",duracao:"Concentração, até 2 horas",classes:["druida","feiticeiro","mago"],descricao:"Escava, move ou remodela terra em área de 12m. 10 minutos para cada alteração. Pode criar trincheiras, muralhas de terra, ou desmoronar estruturas."},
  {nome:"🛡️ Guardião Espiritual Maior (Guardian of Faith)",nivel:6,escola:"Conjuração",tempo:"1 Ação",alcance:"9m",componentes:"V",duracao:"8 horas",classes:["clerigo"],descricao:"Guardião espectral (CA 20, 60 PV). Ataca hostis que entram em raio de 3m: <strong>20 de dano radiante</strong> (DES metade). Desaparece após causar 100 de dano total."},
  {nome:"💨 Vento Divino (Wind Walk)",nivel:6,escola:"Transmutação",tempo:"1 Minuto",alcance:"9m",componentes:"V, S, M (fogo)",duracao:"8 horas",classes:["druida"],descricao:"Você e até 10 criaturas viram nuvens gasosas. Voam 90m por rodada (108 km/h). Podem passar por fendas. Não podem atacar, conjurar ou interagir. Termina com ação."},
  {nome:"🌱 Muralha de Espinhos (Wall of Thorns)",nivel:6,escola:"Conjuração",tempo:"1 Ação",alcance:"36m",componentes:"V, S, M (espinho)",duracao:"Concentração, até 10 min",classes:["druida"],descricao:"Parede de arbustos espinhosos (18m comp, 6m altura, 1,5m espessura). Bloqueia visão. Criaturas que entram ou começam turno dentro sofrem <strong>7d8 de dano perfurante</strong> (DES metade). +1d8 por nível."},
  {nome:"🧟 Dança Macabra (Danse Macabre)",nivel:6,escola:"Necromancia",tempo:"1 Ação",alcance:"18m",componentes:"V, S",duracao:"Concentração, até 1 hora",classes:["mago","bruxo"],descricao:"Anima 5 cadáveres pequenos/médios como esqueletos ou zumbis. Eles ganham +mod de conjuração em ataque e dano. Ação bônus para comandar todos. Viram pó ao fim."},
  {nome:"🔮 Contingência (Contingency)",nivel:6,escola:"Evocação",tempo:"10 Minutos",alcance:"Pessoal",componentes:"V, S, M (estátua de marfim 1500po)",duracao:"10 dias",classes:["mago"],descricao:"Define condição que ativa magia de 5º nível ou inferior em você. Ex: Se eu cair a 0 PV, conjurar Reviver. A magia armazenada gasta slot no momento da conjuração da Contingência."},
  {nome:"💫 Cura em Massa (Mass Heal)",nivel:6,escola:"Abjuração",tempo:"1 Ação",alcance:"18m",componentes:"V, S",duracao:"Instantânea",classes:["clerigo"],descricao:"Cura <strong>30 PV</strong> em até 6 criaturas visíveis. Remove cegueira, surdez e doenças de cada alvo. +10 PV por alvo por nível acima."},
  {nome:"🦅 Transporte via Plantas (Transport via Plants)",nivel:6,escola:"Conjuração",tempo:"1 Ação",alcance:"3m",componentes:"V, S",duracao:"1 rodada",classes:["druida"],descricao:"Entra em planta Grande ou maior e sai por outra da mesma espécie a qualquer distância no mesmo plano. Leva até 5 criaturas voluntárias."},
  {nome:"🌑 Escuridão Profunda (Deep Darkness)",nivel:6,escola:"Evocação",tempo:"1 Ação",alcance:"45m",componentes:"V, S, M (obsidiana)",duracao:"Concentração, até 10 min",classes:["mago","feiticeiro","bruxo"],descricao:"Esfera de escuridão absoluta de 18m de raio. Visão no escuro, visão verdadeira e magias de luz de 6º nível ou inferior não funcionam. Silêncio total dentro. Criaturas dentro ficam surdas."},
  {nome:"🔥 Muro de Lava (Wall of Lava)",nivel:6,escola:"Evocação",tempo:"1 Ação",alcance:"36m",componentes:"V, S, M (obsidiana derretida)",duracao:"Concentração, até 1 min",classes:["mago","druida","feiticeiro"],descricao:"Parede de lava (18m comp, 6m altura, 1,5m espessura). Atravessar: <strong>10d10 de dano de fogo</strong>. A 3m: 5d10. Dentro: 10d10 por turno. Terreno ao redor vira difícil por calor."},
  {nome:"💀 Maldição da Morte (Harm)",nivel:6,escola:"Necromancia",tempo:"1 Ação",alcance:"18m",componentes:"V, S",duracao:"Instantânea",classes:["clerigo"],descricao:"Doença mística assola criatura. Sofre <strong>14d6 de dano necrótico</strong> (CON metade). O dano máximo reduz PV máximos do alvo até Restauração Maior. Não pode reduzir PV abaixo de 1."},
  {nome:"🌀 Portal Arcano (Arcane Gate)",nivel:6,escola:"Conjuração",tempo:"1 Ação",alcance:"150m",componentes:"V, S",duracao:"Concentração, até 10 min",classes:["mago","feiticeiro","bruxo"],descricao:"Cria 2 portais circulares (3m diâmetro) conectados. Criaturas e objetos podem atravessar instantaneamente. Portais são frente e verso. Pode orientá-los em qualquer ângulo."},
  {nome:"👁️ Esfera de Invulnerabilidade (Globe of Invulnerability)",nivel:6,escola:"Abjuração",tempo:"1 Ação",alcance:"Pessoal (3m raio)",componentes:"V, S, M (pérola de vidro)",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro"],descricao:"Esfera imóvel ao seu redor. Magias de 5º nível ou inferior conjuradas de fora não podem afetar criaturas dentro, mesmo com dissipar. Magias de dentro funcionam normalmente."},
  {nome:"🦋 Reencarnação (Reincarnate)",nivel:6,escola:"Transmutação",tempo:"1 Hora",alcance:"Toque",componentes:"V, S, M (óleos raros 1000po)",duracao:"Instantânea",classes:["druida"],descricao:"Traz humanóide morto há até 10 dias de volta em corpo novo aleatório (role na tabela de raças). Mantém memórias e personalidade. Raça anterior substituída pela nova."},
    // ==================== NÍVEL 7 - 20 MAGIAS ====================
  {nome:"⚡ Teletransporte (Teleport)",nivel:7,escola:"Conjuração",tempo:"1 Ação",alcance:"3m",componentes:"V",duracao:"Instantânea",classes:["mago","feiticeiro","bard"],descricao:"Transporta você e até 8 criaturas voluntárias para destino conhecido. Precisão depende de familiaridade: Permanente (sem erro), Objeto associado (100%), Muito familiar (01-05 erro), Visto ocasionalmente (01-25 erro), Visto uma vez (01-45 erro), Descrição (01-55 erro), Falso destino (01-100 erro). Erro: distância aleatória."},
  {nome:"🔥 Tempestade de Fogo (Fire Storm)",nivel:7,escola:"Evocação",tempo:"1 Ação",alcance:"45m",componentes:"V, S",duracao:"Instantânea",classes:["mago","feiticeiro","druida","clerigo"],descricao:"Incêndio divino em até 10 cubos de 3m que você organiza. Criaturas sofrem <strong>7d10 de dano de fogo</strong> (DES metade). Incendeia objetos inflamáveis. Não danifica vegetação se você escolher."},
  {nome:"🌀 Inversão da Gravidade (Reverse Gravity)",nivel:7,escola:"Transmutação",tempo:"1 Ação",alcance:"30m",componentes:"V, S, M (ímã e limalha)",duracao:"Concentração, até 1 min",classes:["mago","druida","feiticeiro"],descricao:"Inverte gravidade em cilindro de 15m raio e 30m altura. Criaturas e objetos não fixados caem para cima (10d6 de dano ao atingir topo ou teto). Ao fim da magia, tudo cai de volta."},
  {nome:"💀 Toque da Morte (Finger of Death)",nivel:7,escola:"Necromancia",tempo:"1 Ação",alcance:"18m",componentes:"V, S",duracao:"Instantânea",classes:["mago","feiticeiro","bruxo"],descricao:"Dedo emana energia mortal. Alvo sofre <strong>7d8 + 30 de dano necrótico</strong> (CON metade). Se matar humanoide, levanta-se como zumbi permanentemente sob seu controle no próximo turno."},
  {nome:"🌈 Cidade Etérea (Etherealness)",nivel:7,escola:"Transmutação",tempo:"1 Ação",alcance:"Pessoal",componentes:"V, S",duracao:"Até 8 horas",classes:["mago","feiticeiro","bruxo","clerigo","druida","bard"],descricao:"Você entra no Plano Etéreo. Vê o Plano Material em tons cinza (18m). Pode se mover livremente através de objetos sólidos. Termina com ação bônus."},
  {nome:"🧠 Enxame de Meteoros Menor (Delayed Blast Fireball)",nivel:7,escola:"Evocação",tempo:"1 Ação",alcance:"45m",componentes:"V, S, M (pérola)",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro"],descricao:"Orbe de fogo comprimido. Explode quando ativado ou ao fim da concentração em raio de 6m: <strong>12d6 de dano de fogo</strong> (DES metade). A cada turno que segura, adiciona +1d6 (máx 22d6). +1d6 base por nível."},
  {nome:"⚰️ Ressurreição (Resurrection)",nivel:7,escola:"Necromancia",tempo:"1 Hora",alcance:"Toque",componentes:"V, S, M (diamante 1000po)",duracao:"Instantânea",classes:["clerigo","bard"],descricao:"Traz criatura morta há até 100 anos de volta à vida. Precisa de corpo inteiro (ou partes significativas). Volta com PV cheios. Cura doenças, venenos. Penalidade: -4 em jogadas até 4 descansos longos."},
  {nome:"🔮 Visão Plana (Plane Shift)",nivel:7,escola:"Conjuração",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (forquilha afinada 250po)",duracao:"Instantânea",classes:["mago","clerigo","druida","feiticeiro","bruxo"],descricao:"Transporta você e até 8 criaturas voluntárias para outro plano de existência. Se usado ofensivamente: criatura falha em CAR e é banida para plano aleatório."},
  {nome:"👁️ Olho de Vigilância (Symbol)",nivel:7,escola:"Abjuração",tempo:"1 Minuto",alcance:"Toque",componentes:"V, S, M (mercúrio e diamante 1000po)",duracao:"Até ser ativado",classes:["mago","clerigo","bard","druida"],descricao:"Inscreve glifo poderoso em superfície. Efeitos ao ativar: Morte (10d10 necrótico, CON metade), Discórdia (brigam entre si), Medo (amedrontados e fogem), Desespero (desvantagem em tudo), Dano (10d10 elemental), Sono (inconscientes 10 min), Atordoamento (atordoados 1 min)."},
  {nome:"🌪️ Tornado (Whirlwind)",nivel:7,escola:"Evocação",tempo:"1 Ação",alcance:"90m",componentes:"V, S, M (palha)",duracao:"Concentração, até 1 min",classes:["druida","feiticeiro","mago"],descricao:"Cria tornado de 3m de raio que você move 9m por turno. Criaturas tocadas: <strong>10d6 de dano de contusão</strong> (FOR metade) e levantadas 9m (caem 9m ao sair). Criaturas a 9m: puxadas para dentro."},
  {nome:"🛡️ Mansão Magnífica (Magnificent Mansion)",nivel:7,escola:"Conjuração",tempo:"1 Minuto",alcance:"90m",componentes:"V, S, M (portal de marfim 15po)",duracao:"24 horas",classes:["mago","bard"],descricao:"Cria portal para mansão extradimensional com 50 cômodos mobiliados. Comida para 100 pessoas, servos espectrais (100). Só entram criaturas que você permitir. Ambiente seguro e confortável."},
  {nome:"💫 Regeneração (Regenerate)",nivel:7,escola:"Transmutação",tempo:"1 Minuto",alcance:"Toque",componentes:"V, S, M (roda de oração)",duracao:"1 hora",classes:["clerigo","druida","bard"],descricao:"Criatura tocada regenera 1 PV a cada 6 segundos (600 PV totais). Membros e órgãos perdidos crescem de volta após 2 minutos. Se tiver partes do corpo, pode segurá-las no local para colar instantaneamente."},
  {nome:"🌑 Prisão de Força (Forcecage)",nivel:7,escola:"Evocação",tempo:"1 Ação",alcance:"30m",componentes:"V, S, M (pó de rubi 1500po)",duracao:"1 hora",classes:["mago","feiticeiro","bruxo"],descricao:"Prisão imóvel de força mágica. Forma: cubo de 3m (sólido, grade) ou cela de 6m. Imune a dano e dissipar magia. Só saída: teletransporte com teste de CAR ou Desintegrar. Criatura dentro pode ser vista mas não tocada."},
  {nome:"🔥 Investidura Primordial (Primordial Ward)",nivel:7,escola:"Abjuração",tempo:"1 Ação",alcance:"Pessoal",componentes:"V, S",duracao:"Concentração, até 1 min",classes:["druida"],descricao:"Você ganha resistência a ácido, frio, fogo, elétrico e trovão. Quando sofrer dano elemental, pode usar reação para ganhar imunidade temporária a esse tipo até o início do próximo turno."},
  {nome:"🌀 Palavra de Poder: Atordoar (Power Word: Stun)",nivel:7,escola:"Encantamento",tempo:"1 Ação",alcance:"18m",componentes:"V",duracao:"Instantânea",classes:["mago","feiticeiro","bard","bruxo"],descricao:"Palavra de poder atordoa criatura. Se tiver <strong>150 PV ou menos, fica atordoada</strong>. Se tiver mais, não sofre efeito. A cada fim de turno, teste de CON para sair do atordoamento."},
  {nome:"🌌 Névoa da Morte (Death Fog)",nivel:7,escola:"Conjuração",tempo:"1 Ação",alcance:"36m",componentes:"V, S, M (cinzas de morto)",duracao:"Concentração, até 10 min",classes:["mago","feiticeiro","bruxo"],descricao:"Névoa sólida e mortal em esfera de 12m de raio. Visão totalmente bloqueada. Criaturas dentro sofrem <strong>8d8 de dano necrótico</strong> por turno (CON metade) e não podem curar. Mortos-vivos curam 8d8 por turno."},
  {nome:"👻 Projetar Imagem (Project Image)",nivel:7,escola:"Ilusão",tempo:"1 Ação",alcance:"800km",componentes:"V, S, M (réplica sua 5po)",duracao:"Concentração, até 24 horas",classes:["mago","bard"],descricao:"Cria duplicata ilusória sua em local conhecido. Você vê, ouve e fala através dela. Pode mover com ação bônus. Atravessa objetos. Imune a dano. Seu corpo real fica inerte."},
  {nome:"🔮 Transferir Vida (Life Transference)",nivel:7,escola:"Necromancia",tempo:"1 Ação",alcance:"9m",componentes:"V, S",duracao:"Instantânea",classes:["mago","clerigo","druida"],descricao:"Sacrifício massivo. Você sofre <strong>8d8 de dano necrótico</strong> (não reduzível) e cura criatura alvo pelo <strong>triplo do dano sofrido</strong>. Se morrer pelo dano, a cura ainda ocorre."},
  {nome:"🌱 Animar Plantas (Animate Plants)",nivel:7,escola:"Transmutação",tempo:"1 Ação",alcance:"36m",componentes:"V, S",duracao:"Concentração, até 1 min",classes:["druida"],descricao:"Anima árvores e arbustos em área de 9m. Criam terreno difícil (ou normal com ação bônus). Atacam: +seu mod de SAB, 4d10 de dano de contusão. Podem agarrar (impedido). 1 criatura por 1,5m²."},
  {nome:"💀 Dedo da Morte (Finger of Death)",nivel:7,escola:"Necromancia",tempo:"1 Ação",alcance:"18m",componentes:"V, S",duracao:"Instantânea",classes:["mago","feiticeiro","bruxo"],descricao:"Energia necrótica concentrada. Alvo sofre <strong>7d8 + 30 de dano necrótico</strong> (CON metade). Humanóides mortos por esta magia se levantam como zumbis permanentemente sob seu controle."},
    // ==================== NÍVEL 8 - 15 MAGIAS ====================
  {nome:"🧠 Dominar Monstro (Dominate Monster)",nivel:8,escola:"Encantamento",tempo:"1 Ação",alcance:"18m",componentes:"V, S",duracao:"Concentração, até 1 hora",classes:["mago","feiticeiro","bard","bruxo"],descricao:"Criatura visível falha em SAB e fica <strong>dominada</strong>. Você controla telepaticamente suas ações. Funciona em qualquer tipo de criatura. Repete teste ao sofrer dano. Slot 9º: duração 8 horas."},
  {nome:"💥 Explosão Solar (Sunburst)",nivel:8,escola:"Evocação",tempo:"1 Ação",alcance:"45m",componentes:"V, S, M (girassol)",duracao:"Instantânea",classes:["mago","druida","feiticeiro","clerigo"],descricao:"Luz solar radiante em raio de 18m. Criaturas sofrem <strong>12d6 de dano radiante</strong> (CON metade) e ficam <strong>cegas</strong> por 1 minuto. Mortos-vivos e gosmas têm desvantagem. Dissipa escuridão mágica de 8º nível ou inferior."},
  {nome:"🧟 Criar Mortos-Vivos em Massa (Create Undead)",nivel:8,escola:"Necromancia",tempo:"1 Minuto",alcance:"3m",componentes:"V, S, M (ônix 150po/cadáver)",duracao:"24 horas",classes:["mago","clerigo","bruxo"],descricao:"Cria 6 ghouls ou 4 ghasts ou 3 wights ou 2 múmias a partir de cadáveres. Obedecem comandos verbais. Reafirma controle a cada 24h."},
  {nome:"🌪️ Terremoto (Earthquake)",nivel:8,escola:"Evocação",tempo:"1 Ação",alcance:"150m",componentes:"V, S, M (solo)",duracao:"Concentração, até 1 min",classes:["mago","druida","feiticeiro","clerigo"],descricao:"Terremoto em raio de 30m. Efeitos: terreno difícil, <strong>5d6 de dano de contusão</strong> por rodada a criaturas em contato com o chão (DES metade), fendas (50% de cair, 1d6x3m de profundidade), estruturas colapsam (50 de dano por rodada)."},
