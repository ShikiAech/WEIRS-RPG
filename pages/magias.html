  {nome:"⚡ Palavra de Poder: Atordoar (Power Word Stun)",nivel:8,escola:"Encantamento",tempo:"1 Ação",alcance:"18m",componentes:"V",duracao:"Instantânea",classes:["mago","feiticeiro","bard","bruxo"],descricao:"Criatura com <strong>150 PV ou menos fica atordoada</strong> imediatamente, sem teste de resistência. Repete teste de CON no fim de cada turno para se recuperar."},
  {nome:"🛡️ Campo Antimagia (Antimagic Field)",nivel:8,escola:"Abjuração",tempo:"1 Ação",alcance:"Pessoal (3m raio)",componentes:"V, S, M (pó de ferro)",duracao:"Concentração, até 1 hora",classes:["mago","clerigo"],descricao:"Esfera de 3m de raio ao seu redor suprime toda magia. Itens mágicos viram mundanos. Magias não funcionam. Invocações e mortos-vivos são suprimidos (não destruídos). Artefatos e magias divinas de divindades ignoram."},
  {nome:"🌑 Labirinto (Maze)",nivel:8,escola:"Conjuração",tempo:"1 Ação",alcance:"18m",componentes:"V, S",duracao:"Concentração, até 10 min",classes:["mago","feiticeiro"],descricao:"Criatura é banida para semiplano labiríntico. Sem teste inicial. Para escapar: ação para teste de INT CD 20 (não é teste de atributo). Se passar, retorna. Se não escapar em 10 min, retorna automaticamente. Minotauros e goristros escapam automaticamente."},
  {nome:"💀 Clone (Clone)",nivel:8,escola:"Necromancia",tempo:"1 Hora",alcance:"Toque",componentes:"V, S, M (diamante 1000po + carne)",duracao:"Instantânea",classes:["mago"],descricao:"Cria clone inerte de criatura viva em recipiente. Se o original morrer, a alma transfere para o clone (desde que esteja intacto). O clone tem a mesma personalidade, memórias e capacidades, mas sem equipamento. O recipiente deve ser mantido selado."},
  {nome:"🧠 Sinapse Psíquica (Mind Blank)",nivel:8,escola:"Abjuração",tempo:"1 Ação",alcance:"Toque",componentes:"V, S",duracao:"24 horas",classes:["mago","bard"],descricao:"Protege mente de criatura tocada. Imunidade a dano psíquico, leitura de pensamentos, adivinhações, charme e dominação. Até Desejo e intervenção divina não conseguem afetar a mente do alvo."},
  {nome:"🔥 Incendiar Nuvem (Incendiary Cloud)",nivel:8,escola:"Conjuração",tempo:"1 Ação",alcance:"45m",componentes:"V, S",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro","druida"],descricao:"Nuvem de fumaça flamejante em esfera de 6m de raio. Criaturas dentro sofrem <strong>10d8 de dano de fogo</strong> ao entrar ou começar turno (DES metade). Nuvem move-se 3m por turno na direção do vento ou você move 9m com ação."},
  {nome:"🦅 Metamorfose Animal (Animal Shapes)",nivel:8,escola:"Transmutação",tempo:"1 Ação",alcance:"9m",componentes:"V, S",duracao:"Concentração, até 24 horas",classes:["druida"],descricao:"Transforma qualquer número de criaturas voluntárias visíveis em bestas de ND 4 ou inferior. Mantêm personalidade e alinhamento. Assumem PV da nova forma. Retornam ao original com PV que tinham antes."},
  {nome:"🌀 Semiplano (Demiplane)",nivel:8,escola:"Conjuração",tempo:"1 Ação",alcance:"18m",componentes:"S",duracao:"1 hora",classes:["mago","bruxo"],descricao:"Cria porta para semiplano vazio de 9m cúbicos. Feito de madeira ou pedra. Você pode criar um novo semiplano ou acessar um existente que conheça. A porta some após 1 hora, mas o semiplano persiste."},
  {nome:"🌊 Tsunami (Tsunami)",nivel:8,escola:"Conjuração",tempo:"1 Minuto",alcance:"Ambiental",componentes:"V, S",duracao:"Concentração, até 6 rodadas",classes:["druida"],descricao:"Muralha de água de 90m comprimento, 90m altura e 15m espessura. Avança 15m por rodada. Criaturas no caminho sofrem <strong>6d10 de dano de contusão</strong> e são arrastadas. Estruturas sofrem 100 de dano."},
  {nome:"💫 Cura Completa (Mass Heal)",nivel:8,escola:"Abjuração",tempo:"1 Ação",alcance:"18m",componentes:"V, S",duracao:"Instantânea",classes:["clerigo"],descricao:"Cura <strong>700 PV totais</strong> divididos entre criaturas visíveis. Remove cegueira, surdez, doenças e exaustão. Não afeta mortos-vivos ou construtos."},
  {nome:"🔮 Clarividência Aprimorada (Scrying)",nivel:8,escola:"Adivinhação",tempo:"10 Minutos",alcance:"Ilimitado (mesmo plano)",componentes:"V, S, M (olho de vidro 1000po)",duracao:"Concentração, até 1 hora",classes:["mago","clerigo","druida","feiticeiro","bard","bruxo"],descricao:"Espiona criatura em qualquer lugar do mesmo plano. Vê e ouve a 9m dela. Teste de SAB do alvo para resistir. Bônus de -10 a +5 dependendo de quão bem conhece o alvo. Pode usar magias de detecção através do sensor."},
    // ==================== NÍVEL 9 - 15 MAGIAS ====================
  {nome:"👑 Desejo (Wish)",nivel:9,escola:"Conjuração",tempo:"1 Ação",alcance:"Pessoal",componentes:"V",duracao:"Instantânea",classes:["mago","feiticeiro"],descricao:"A magia mais poderosa do multiverso. Uso básico: duplica qualquer magia de 8º nível ou inferior instantaneamente, ignorando requisitos e custos. Uso avançado: altera a realidade (risco de nunca mais conjurar Desejo, 33% de chance). Causa estresse: 1d10 de dano necrótico por nível de magia conjurada até próximo descanso longo."},
  {nome:"💀 Palavra de Poder: Matar (Power Word Kill)",nivel:9,escola:"Encantamento",tempo:"1 Ação",alcance:"18m",componentes:"V",duracao:"Instantânea",classes:["mago","feiticeiro","bruxo"],descricao:"Você profere palavra de poder que força a alma a deixar o corpo. Se o alvo tiver <strong>100 pontos de vida ou menos, morre instantaneamente</strong>, sem direito a testes de resistência."},
  {nome:"⚡ Meteoro Enxame (Meteor Swarm)",nivel:9,escola:"Evocação",tempo:"1 Ação",alcance:"1,5km",componentes:"V, S",duracao:"Instantânea",classes:["mago","feiticeiro"],descricao:"Quatro meteoros caem em pontos visíveis, cada um explodindo em raio de 12m. Criaturas sofrem <strong>20d6 de dano de fogo + 20d6 de dano de contusão</strong> por meteoro (DES metade). Uma criatura pode ser atingida por múltiplos meteoros."},
  {nome:"🛑 Aprisionamento (Imprisonment)",nivel:9,escola:"Abjuração",tempo:"1 Minuto",alcance:"9m",componentes:"V, S, M (estátua do alvo 500po/pv)",duracao:"Até ser dissipado",classes:["mago","bruxo"],descricao:"Aprisiona criatura permanentemente. Opções: sepultamento (centro da terra), corrente (acorrentado), prisão labiríntica (semiplano), esfera minúscula (encolhe e prende em gema), adormecido (sono eterno). Teste de SAB para resistir. Libertação requer condição específica definida por você."},
  {nome:"🌌 Portal (Gate)",nivel:9,escola:"Conjuração",tempo:"1 Ação",alcance:"18m",componentes:"V, S, M (diamante 5000po)",duracao:"Concentração, até 1 min",classes:["mago","clerigo","feiticeiro"],descricao:"Cria portal circular de 1,5m a 6m de diâmetro para outro plano. Pode invocar criatura específica (falha em CAR para resistir). Portal permite trânsito bidirecional. Divindades e senhores dos planos podem bloquear portais em seus domínios."},
  {nome:"🧟 Legião de Mortos-Vivos (Create Undead)",nivel:9,escola:"Necromancia",tempo:"1 Minuto",alcance:"3m",componentes:"V, S, M (ônix 150po/cadáver)",duracao:"24 horas",classes:["mago","clerigo","bruxo"],descricao:"Cria 8 ghouls, 6 ghasts, 4 wights ou 2 múmias de cadáveres. Obedecem comandos. Reafirma controle a cada 24h. Pode manter até 45 criaturas simultaneamente com múltiplas conjurações."},
  {nome:"🌈 Forma Incorpórea (Astral Projection)",nivel:9,escola:"Necromancia",tempo:"1 Hora",alcance:"3m",componentes:"V, S, M (jade 1000po/criatura)",duracao:"Até ser dissipado",classes:["mago","clerigo","bruxo"],descricao:"Projeta você e até 8 criaturas no Plano Astral, deixando corpos físicos em animação suspensa. Podem viajar para outros planos exteriores através do Astral. Se corpo físico morrer, cordão prateado se rompe e projeção morre."},
  {nome:"🔥 Tempestade de Vingança (Storm of Vengeance)",nivel:9,escola:"Conjuração",tempo:"1 Ação",alcance:"Ilimitado",componentes:"V, S",duracao:"Concentração, até 1 min",classes:["druida"],descricao:"Tempestade apocalíptica em cilindro de 108m de raio, 1,5km de altura. Rodada 1: trovões ensurdecedores (3d6 de trovão). Rodada 2-4: chuva ácida (1d6 de ácido). Rodada 5-10: 6 raios por rodada (10d6 de elétrico cada) + granizo (2d6 de contusão). Você escolhe quem é afetado."},
  {nome:"💫 Cura em Massa (Mass Heal)",nivel:9,escola:"Abjuração",tempo:"1 Ação",alcance:"18m",componentes:"V, S",duracao:"Instantânea",classes:["clerigo"],descricao:"Cura <strong>700 PV totais</strong> divididos entre qualquer número de criaturas visíveis. Remove todas as doenças, cegueira, surdez e condições que afetam sentidos. Não afeta mortos-vivos ou construtos."},
  {nome:"🔮 Viagem no Tempo (Time Stop)",nivel:9,escola:"Transmutação",tempo:"1 Ação",alcance:"Pessoal",componentes:"V",duracao:"Instantânea",classes:["mago","feiticeiro"],descricao:"Você para o tempo para todos menos você. Role 1d4+1 para determinar quantos turnos extras você ganha. Durante esse período, você não pode afetar outras criaturas ou objetos que elas estejam segurando. Termina se você se mover a mais de 300m de onde conjurou."},
  {nome:"🦅 Verdadeira Polimorfia (True Polymorph)",nivel:9,escola:"Transmutação",tempo:"1 Ação",alcance:"9m",componentes:"V, S, M (gota de mercúrio)",duracao:"Concentração, até 1 hora",classes:["mago","feiticeiro","bard","bruxo"],descricao:"Transforma criatura em outra criatura (ND igual ou menor) ou objeto, ou objeto em criatura (ND 9 ou menor). Se concentrar por 1 hora completa, a transformação é <strong>permanente</strong> (até ser dissipada). A criatura assume estatísticas completas da nova forma."},
  {nome:"🌑 Fenda (Weird)",nivel:9,escola:"Ilusão",tempo:"1 Ação",alcance:"36m",componentes:"V, S",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro","bruxo"],descricao:"Cria ilusão dos piores medos de criaturas em esfera de 9m de raio. Teste de SAB: se falhar, fica amedrontada e sofre <strong>4d10 de dano psíquico</strong>. A cada turno na área: novo teste, mesmo dano. Se passar, magia termina para aquela criatura."},
  {nome:"⚰️ Ressurreição Verdadeira (True Resurrection)",nivel:9,escola:"Necromancia",tempo:"1 Hora",alcance:"Toque",componentes:"V, S, M (diamante 25000po)",duracao:"Instantânea",classes:["clerigo","druida"],descricao:"Traz criatura morta há até 200 anos de volta à vida. Não precisa de corpo — cria corpo novo. Volta com PV cheios, sem penalidades. Cura todas as doenças, venenos, maldições e restaura membros perdidos. Pode restaurar mortos-vivos à vida."},
  {nome:"🔥 Forma de Dragão (Shapechange)",nivel:9,escola:"Transmutação",tempo:"1 Ação",alcance:"Pessoal",componentes:"V, S, M (jade 1500po)",duracao:"Concentração, até 1 hora",classes:["mago","druida"],descricao:"Você pode se transformar em qualquer criatura de ND igual ou menor que seu nível (máximo ND 20). Mantém suas proficiências e personalidade. Ganha todas as estatísticas da nova forma, exceto PV (mantém seus PV). Pode mudar de forma com ação bônus a cada turno."},
  {nome:"💀 Invulnerabilidade (Invulnerability)",nivel:9,escola:"Abjuração",tempo:"1 Ação",alcance:"Pessoal",componentes:"V, S, M (adamantina 500po)",duracao:"Concentração, até 10 min",classes:["mago","feiticeiro"],descricao:"Você se torna <strong>imune a todo dano</strong> por toda a duração. Nada pode feri-lo: armas, magias, venenos, quedas, calor, vácuo — nada. A única exceção são artefatos e magias de nível similar conjuradas por divindades ou seres de poder absoluto."},
    // ==================== MAGIAS ADICIONAIS - NÍVEL 0 (TRUQUES) ====================
  {nome:"🎯 Pedra Mágica (Magic Stone)",nivel:0,escola:"Transmutação",tempo:"1 Ação Bônus",alcance:"Toque",componentes:"V, S",duracao:"1 minuto",classes:["druida","artifice","bruxo"],descricao:"Você toca 1-3 pedras e as imbui com magia. Elas podem ser arremessadas (18m) causando <strong>1d6 + mod de conjuração</strong> de dano de concussão. Usa seu mod de conjuração para ataque."},
  {nome:"🌬️ Lufada Primordial (Primal Savagery)",nivel:0,escola:"Transmutação",tempo:"1 Ação",alcance:"Pessoal",componentes:"S",duracao:"Instantânea",classes:["druida"],descricao:"Suas unhas ou dentes se alongam com ácido corrosivo. Ataque corpo a corpo mágico causa <strong>1d10 de dano de ácido</strong>. Aumenta para 2d10 (5º), 3d10 (11º), 4d10 (17º)."},
  {nome:"🔔 Sino dos Mortos (Toll the Dead)",nivel:0,escola:"Necromancia",tempo:"1 Ação",alcance:"18m",componentes:"V, S",duracao:"Instantânea",classes:["clerigo","mago","bruxo"],descricao:"Som de sino fúnebre. Alvo falha em SAB: <strong>1d8 de dano necrótico</strong> (1d12 se estiver ferido). Aumenta com nível (5º, 11º, 17º)."},
  {nome:"💧 Respingo Ácido (Acid Splash)",nivel:0,escola:"Conjuração",tempo:"1 Ação",alcance:"18m",componentes:"V, S",duracao:"Instantânea",classes:["mago","feiticeiro","artifice"],descricao:"Bolha de ácido atinge 1 ou 2 criaturas adjacentes. Teste de DES ou sofrem <strong>1d6 de dano de ácido</strong>. Aumenta para 2d6 (5º), 3d6 (11º), 4d6 (17º)."},
  {nome:"🪓 Infestar (Infestation)",nivel:0,escola:"Conjuração",tempo:"1 Ação",alcance:"9m",componentes:"V, S, M (pulgas)",duracao:"Instantânea",classes:["druida","feiticeiro","mago","bruxo"],descricao:"Pragas místicas atacam criatura. Teste de CON ou sofre <strong>1d6 de dano de veneno</strong> e move 1,5m em direção aleatória. Aumenta com nível."},
  {nome:"⚡ Centelha de Fogo (Fire Bolt)",nivel:0,escola:"Evocação",tempo:"1 Ação",alcance:"36m",componentes:"V, S",duracao:"Instantânea",classes:["mago","feiticeiro","artifice"],descricao:"Projétil de fogo. Ataque mágico à distância: <strong>1d10 de dano de fogo</strong>. Incendeia objetos inflamáveis não vestidos. Aumenta para 2d10 (5º), 3d10 (11º), 4d10 (17º)."},
  {nome:"❄️ Toque Congelante (Frostbite)",nivel:0,escola:"Evocação",tempo:"1 Ação",alcance:"18m",componentes:"V, S",duracao:"Instantânea",classes:["druida","feiticeiro","mago","artifice"],descricao:"Geada mística cobre criatura. Teste de CON ou sofre <strong>1d6 de dano de frio</strong> e desvantagem no próximo ataque com arma. Aumenta com nível."},

  {nome:"💨 Sopro Curativo (Healing Word)",nivel:1,escola:"Abjuração",tempo:"1 Ação Bônus",alcance:"18m",componentes:"V",duracao:"Instantânea",classes:["clerigo","bard","druida"],descricao:"Cura <strong>1d4 + mod de SAB</strong> PV de criatura visível. Não afeta mortos-vivos/construtos. +1d4 por nível."},
  {nome:"🔥 Braços de Hadar (Arms of Hadar)",nivel:1,escola:"Conjuração",tempo:"1 Ação",alcance:"Pessoal (3m raio)",componentes:"V, S",duracao:"Instantânea",classes:["bruxo"],descricao:"Tentáculos negros brotam de você. Criaturas a 3m sofrem <strong>2d6 de dano necrótico</strong> (FOR metade) e não podem usar reações. +1d6 por nível."},
  {nome:"🌊 Onda de Trovão (Thunderwave)",nivel:1,escola:"Evocação",tempo:"1 Ação",alcance:"Pessoal (cubo 4,5m)",componentes:"V, S",duracao:"Instantânea",classes:["mago","druida","feiticeiro","bard"],descricao:"Onda de força trovejante empurra criaturas 3m e causa <strong>2d8 de dano de trovão</strong> (CON metade). +1d8 por nível."},

  {nome:"🔗 Corrente Relampejante (Lightning Lure)",nivel:2,escola:"Evocação",tempo:"1 Ação",alcance:"Pessoal (4,5m)",componentes:"V",duracao:"Instantânea",classes:["mago","feiticeiro","bruxo","artifice"],descricao:"Chicote elétrico puxa criatura para perto de você. Teste de FOR ou é puxada 3m e sofre <strong>2d8 de dano elétrico</strong>. +1d8 por nível."},
  {nome:"💨 Ventriloquismo (Magic Mouth)",nivel:2,escola:"Ilusão",tempo:"1 Minuto (Ritual)",alcance:"9m",componentes:"V, S, M (mel)",duracao:"Até ser dissipado",classes:["mago","bard","artifice"],descricao:"Implanta mensagem em objeto. Quando condição específica ocorrer (ex: quando um elfo tocar), o objeto fala a mensagem uma vez. Pode ter até 25 palavras."},
  {nome:"🌫️ Nuvem Fétida (Stinking Cloud)",nivel:2,escola:"Conjuração",tempo:"1 Ação",alcance:"27m",componentes:"V, S, M (ovo podre)",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro","druida","bard"],descricao:"Nuvem amarelo-esverdeada de 6m de raio. Criaturas dentro fazem teste de CON ou ficam incapacitadas por vômito. Mesmo se passarem, visão é obscurecida."},
  {nome:"🔥 Mãos Flamejantes (Aganazzar's Scorcher)",nivel:2,escola:"Evocação",tempo:"1 Ação",alcance:"Pessoal (linha 9m)",componentes:"V, S, M (escama de dragão)",duracao:"Instantânea",classes:["mago","feiticeiro"],descricao:"Jato de fogo em linha de 9m. Criaturas sofrem <strong>3d8 de dano de fogo</strong> (DES metade). +1d8 por nível."},
  {nome:"🦅 Asas de Águia (Eagle's Splendor)",nivel:2,escola:"Transmutação",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (penas)",duracao:"Concentração, até 1 hora",classes:["mago","feiticeiro","bard","artifice"],descricao:"Criatura ganha <strong>vantagem em Carisma</strong> e +2 na CD de magias de encantamento. +1 alvo por nível."},

  {nome:"🌱 Falar com Plantas (Speak with Plants)",nivel:3,escola:"Transmutação",tempo:"1 Ação",alcance:"Pessoal (9m)",componentes:"V, S",duracao:"10 minutos",classes:["druida","bard"],descricao:"Plantas a 9m se tornam sencientes e podem se comunicar. Podem mover vinhas, criar passagem ou fazer terreno difícil se forem amigáveis."},
  {nome:"🔵 Proteção contra Energia (Protection from Energy)",nivel:3,escola:"Abjuração",tempo:"1 Ação",alcance:"Toque",componentes:"V, S",duracao:"Concentração, até 1 hora",classes:["mago","clerigo","druida","paladino","patrulheiro","artifice"],descricao:"Resistência a um tipo de dano: ácido, frio, fogo, elétrico ou trovão. Escolha ao conjurar."},
  {nome:"🌀 Névoa Fedorenta (Stinking Cloud)",nivel:3,escola:"Conjuração",tempo:"1 Ação",alcance:"27m",componentes:"V, S, M (ovo podre)",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro","druida","bard"],descricao:"Nuvem de gás fétido em raio de 6m. Criaturas dentro ficam incapacitadas (vômito) se falharem em CON. Visão obscurecida."},
  {nome:"✨ Muralha Cintilante (Wall of Light)",nivel:3,escola:"Evocação",tempo:"1 Ação",alcance:"36m",componentes:"V, S, M (espelho)",duracao:"Concentração, até 1 min",classes:["mago","feiticeiro","druida","clerigo"],descricao:"Parede de luz radiante (18m comp, 3m altura). Criaturas na área sofrem <strong>4d8 de dano radiante</strong> (cegas se falharem em CON). +1d8 por nível."},

  {nome:"🛡️ Aura de Pureza (Aura of Purity)",nivel:4,escola:"Abjuração",tempo:"1 Ação",alcance:"Pessoal (9m)",componentes:"V",duracao:"Concentração, até 10 min",classes:["clerigo","paladino"],descricao:"Aliados na aura não podem ficar doentes, envenenados ou amedrontados. Resistência a veneno e vantagem contra estas condições."},

  {nome:"🌀 Porta Dimensional (Dimension Door)",nivel:4,escola:"Conjuração",tempo:"1 Ação",alcance:"150m",componentes:"V",duracao:"Instantânea",classes:["mago","feiticeiro","bard","bruxo"],descricao:"Teletransporta você + 1 criatura voluntária para ponto visível/descrito. 4d6 de dano de força se local estiver ocupado."},

  {nome:"🦋 Pele de Pedra (Stoneskin)",nivel:4,escola:"Abjuração",tempo:"1 Ação",alcance:"Toque",componentes:"V, S, M (diamante 100po)",duracao:"Concentração, até 1 hora",classes:["mago","druida","artifice"],descricao:"Resistência a dano não-mágico de concussão, perfurante e cortante. Diamante consumido."},

    function normalizarTexto(texto) {
      return texto
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
    }
    
    const inputNome = document.getElementById("busca-magia-nome");
    const selectNivel = document.getElementById("filtro-magia-nivel");
    const selectClasse = document.getElementById("filtro-magia-classe");
    const selectEscola = document.getElementById("filtro-magia-escola");
    const listaGrimorio = document.getElementById("grimorio-lista");
    const txtContador = document.getElementById("contador-magias");
    
    function renderizarMagias(magias) {
      listaGrimorio.innerHTML = "";
      txtContador.innerText = magias.length;
      
      if (magias.length === 0) {
        listaGrimorio.innerHTML = `
          <div class="sem-resultados">
            ⚠️ Nenhuma magia encontrada com esses filtros.<br>
            <small style="color: #888;">Tente buscar por partes do nome ou ajustar os filtros</small>
          </div>`;
        return;
      }
      
      magias.forEach(magia => {
        const txtNivel = magia.nivel === 0 ? "Truque" : `${magia.nivel}º Nível`;
        const badgesHtml = magia.classes.map(c => `<span class="badge-classe">${c}</span>`).join("");
        
        const card = document.createElement("div");
        card.className = "card-magia";
        card.innerHTML = `
          <div>
            <div class="header-magia">
              <h5 class="nome-magia">${magia.nome}</h5>
              <div class="subtitulo-magia">${txtNivel} — Escola de ${magia.escola}</div>
            </div>
            <div class="meta-magia-grid">
              <div class="meta-item"><strong>Tempo:</strong> ${magia.tempo}</div>
              <div class="meta-item"><strong>Alcance:</strong> ${magia.alcance}</div>
              <div class="meta-item"><strong>Dur.:</strong> ${magia.duracao}</div>
              <div class="meta-item" style="grid-column: 1 / -1;"><strong>Comp.:</strong> ${magia.componentes}</div>
            </div>
            <p class="desc-magia">${magia.descricao}</p>
          </div>
          <div class="badges-classes">${badgesHtml}</div>
        `;
        listaGrimorio.appendChild(card);
      });
    }
    
    function filtrarGrimorio() {
      const termoBusca = normalizarTexto(inputNome.value);
      const filtroNivel = selectNivel.value;
      const filtroClasse = selectClasse.value;
      const filtroEscola = selectEscola.value;
      
      const resultadoFiltrado = bancoMagias.filter(magia => {
        const nomeNormalizado = normalizarTexto(magia.nome);
        const bateNome = termoBusca === "" || nomeNormalizado.includes(termoBusca);
        const bateNivel = (filtroNivel === "todos") || (magia.nivel.toString() === filtroNivel);
        const bateClasse = (filtroClasse === "todas") || (magia.classes.includes(filtroClasse));
        const bateEscola = (filtroEscola === "todas") || (magia.escola === filtroEscola);
        return bateNome && bateNivel && bateClasse && bateEscola;
      });
      
      renderizarMagias(resultadoFiltrado);
    }
    
    inputNome.addEventListener("input", filtrarGrimorio);
    selectNivel.addEventListener("change", filtrarGrimorio);
    selectClasse.addEventListener("change", filtrarGrimorio);
    selectEscola.addEventListener("change", filtrarGrimorio);
    
    renderizarMagias(bancoMagias);
  </script>
