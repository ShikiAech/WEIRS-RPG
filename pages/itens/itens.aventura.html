<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipamento de Aventura — Weirs RPG</title>
    <link rel="stylesheet" href="/WEIRS-RPG/css/style.css">
    <style>
        /* PADDING CIRÚRGICO: Alinhamento para que o menu dinâmico não sobreponha o conteúdo */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding-top: 60px;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
            border-bottom: 2px solid #b9770e;
            padding-bottom: 20px;
            position: relative;
        }
        header h2 {
            font-family: 'Cinzel', serif;
            color: #f39c12;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Controles de Filtro e Busca Rápidos */
        .controles-painel {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 35px;
            background: rgba(25, 25, 27, 0.9);
            padding: 15px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .busca-input {
            flex: 1;
            min-width: 250px;
            background: #0d0d0d;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .busca-input:focus {
            outline: none;
            border-color: #f39c12;
        }

        .ordenar-seletor {
            background: #0d0d0d;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Grid de Cards */
        .equip-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 20px;
        }

        /* Estrutura de Card Compacto */
        .equip-card {
            background: rgba(25, 25, 27, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #b9770e;
            padding: 18px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .equip-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(185, 119, 14, 0.15);
            border-color: #f39c12;
        }

        .equip-card h3 {
            font-family: 'Cinzel', serif;
            color: #fff;
            font-size: 1.05rem;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .equip-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: #a6acaf;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 10px;
        }

        /* Identificação de cores para moedas oficiais */
        .preco-po { color: #ecc94b; font-weight: bold; }
        .preco-pp { color: #cbd5e0; font-weight: bold; }
        .preco-pc { color: #ed8936; font-weight: bold; }

        /* Modal de Detalhes Pop-up */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-content {
            background: #19191b;
            border: 2px solid #b9770e;
            padding: 30px;
            border-radius: 6px;
            max-width: 550px;
            width: 100%;
            position: relative;
            box-shadow: 0 5px 25px rgba(0,0,0,0.7);
        }
        .close-modal {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 24px;
            color: #a6acaf;
            cursor: pointer;
        }
        .close-modal:hover { color: #fff; }
        
        .modal-title {
            font-family: 'Cinzel', serif;
            color: #f39c12;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-size: 1.35rem;
            border-bottom: 1px solid rgba(185, 119, 14, 0.3);
            padding-bottom: 5px;
        }
        .modal-meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 18px;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.02);
            padding: 10px;
            border-radius: 4px;
        }
        .modal-meta-grid strong { color: #e67e22; }
        
        .modal-desc {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #d0d0d0;
            text-align: justify;
        }
    </style>
</head>

            { nome: "Vela", peso: "—", custo: "1 PC", desc: "Fornece Luz Plena em um raio curto de 1,5 metro por 1 hora antes de derreter completamente seu pavio." },
            { nome: "Túnica", peso: "2 kg", custo: "1 PO", desc: "Veste comprida e folgada característica de ordens monásticas, acadêmicas ou seitas religiosas específicas." },
            { nome: "Veneno Básico", peso: "—", custo: "100 PO", desc: "Frasco de veneno. Pode ser aplicado em uma lâmina ou munição como ação bônus para infligir 1d4 de dano de veneno extra no alvo." }
        ];

        const grid = document.getElementById('gridEquipamentos');
        const inputBusca = document.getElementById('inputBusca');
        const selectOrdem = document.getElementById('selectOrdem');

        const modal = document.getElementById('equipModal');
        const mNome = document.getElementById('mNome');
        const mCusto = document.getElementById('mCusto');
        const mPeso = document.getElementById('mPeso');
        const mDescricao = document.getElementById('mDescricao');

        // Conversor numérico de valores baseado no sistema oficial do livro (PO/PP/PC)
        function obterValorMoeda(custoTexto) {
            const partes = custoTexto.split(' ');
            const num = parseFloat(partes[0].replace('.', '')) || 0;
            const moeda = partes[1];
            if (moeda === 'PO') return num * 100;
            if (moeda === 'PP') return num * 10;
            if (moeda === 'PC') return num * 1;
            return 0; // Itens com custo "Varia"
        }

        function renderizar(dados) {
            grid.innerHTML = '';
            dados.forEach(item => {
                const card = document.createElement('div');
                card.className = 'equip-card';
                
                let corMoeda = 'preco-po';
                if (item.custo.includes('PP')) corMoeda = 'preco-pp';
                if (item.custo.includes('PC')) corMoeda = 'preco-pc';

                card.innerHTML = `
                    <h3>${item.nome}</h3>
                    <div class="equip-meta">
                        <span>${item.peso}</span>
                        <span class="${corMoeda}">${item.custo}</span>
                    </div>
                `;
                card.onclick = () => exibirDetalhes(item);
                grid.appendChild(card);
            });
        }

        function exibirDetalhes(item) {
            mNome.innerText = item.nome;
            mCusto.innerText = item.custo;
            mPeso.innerText = item.peso;
            mDescricao.innerText = item.desc;
            modal.style.display = 'flex';
        }

        function fecharJanela(event) {
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }

        function processarFiltros() {
            let filtrados = listaEquipamentos.filter(i => 
                i.nome.toLowerCase().includes(inputBusca.value.toLowerCase())
            );

            if (selectOrdem.value === 'nome') {
                filtrados.sort((a, b) => a.nome.localeCompare(b.nome));
            } else if (selectOrdem.value === 'preco-cres') {
                filtrados.sort((a, b) => obterValorMoeda(a.custo) - obterValorMoeda(b.custo));
            } else if (selectOrdem.value === 'preco-decres') {
                filtrados.sort((a, b) => obterValorMoeda(b.custo) - obterValorMoeda(a.custo));
            } else if (selectOrdem.value === 'peso') {
                filtrados.sort((a, b) => {
                    const pesoA = parseFloat(a.peso.replace(',', '.')) || 0;
                    const pesoB = parseFloat(b.peso.replace(',', '.')) || 0;
                    return pesoA - pesoB;
                });
            }
            renderizar(filtrados);
        }

        inputBusca.addEventListener('input', processarFiltros);
        selectOrdem.addEventListener('change', processarFiltros);

        // Inicialização primária automática
        processarFiltros();
    </script>
</body>
</html>
